_ISO 9001:2015 \u2014 Clauses 8.1 & 8.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to plan and control service provision so outputs consistently meet requirements, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Plan delivery, resources and controls (8.1).
2. Control service provision against defined criteria (8.5).
3. Identify and trace outputs; preserve information.
4. Control changes to service provision.
5. Release only conforming services.
6. Monitor against acceptance criteria.

## Workflow
Plan \u2192 control provision \u2192 monitor \u2192 release conforming service \u2192 change control.

## RACI Matrix
| Activity | Service Delivery Manager | Team | Manager | Executive |
|---|---|---|---|---|
| Plan delivery | A | R | C | I |
| Control service provision | A | R | C | I |
| Release conforming output | R | R | A | I |
| Control changes | A | C | R | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Service Delivery Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Services meeting acceptance criteria | \u2265 98% |
| Unplanned changes | Downward trend |

## Required Records
Service records, acceptance evidence, and change records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},purchasing:{title:"Control of External Providers",clause:"8.4",content:`# Control of Externally Provided Processes & Suppliers
_ISO 9001:2015 \u2014 Clause 8.4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure externally provided processes, products and services conform to requirements, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define criteria for evaluation and selection of providers.
2. Communicate requirements to providers.
3. Verify externally provided items meet requirements.
4. Monitor provider performance.
5. Re-evaluate and re-approve providers periodically.
6. Address provider nonconformities.

## Workflow
Evaluate \u2192 select \u2192 communicate requirements \u2192 verify \u2192 monitor \u2192 re-approve.

## Key Controls
| Control | Standard |
|---|---|
| Evaluation & selection | Criteria-based |
| Requirements to suppliers | Documented |
| Verification | On receipt/service |
| Performance monitoring | Periodic |

## Roles & Responsibilities
- **Quality Manager** \u2014 owns this area; accountable for its outcomes.

|---|---|

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},nonconformity:{title:"Control of Nonconforming Outputs",clause:"8.7",content:`# Control of Nonconforming Outputs
_ISO 9001:2015 \u2014 Clause 8.7 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and control outputs that do not conform, to prevent unintended use, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Identify and segregate nonconforming output.
2. Correct, or obtain concession where appropriate.
3. Record the nonconformity and action taken.
4. Verify conformity after correction.
5. Raise corrective action where recurrence is likely.

## Workflow
Detect nonconformity \u2192 segregate \u2192 correct/concession \u2192 verify \u2192 record \u2192 corrective action.

## Key Controls
| Control | Standard |
|---|---|
| Identification | Marked & segregated |
| Disposition | Correct / concession / reject |
| Verification | Re-checked |
| Records | Retained |

## Roles & Responsibilities
- **Quality Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|

| NCR closure on time | \u2265 90% |

Nonconformity records and disposition decisions. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},monitoring:{title:"Monitoring, Measurement & Customer Satisfaction",clause:"9.1",content:`# Monitoring, Measurement & Customer Satisfaction

_ISO 22301:2019 \u2014 Clause 8.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to select strategies and solutions that meet the recovery objectives from the BIA, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Derive requirements from the BIA (RTO/RPO/MTPD).
2. Identify options for people, premises, technology and suppliers.
3. Select strategies that meet objectives at justifiable cost.
4. Provision the required resources.
5. Document solution details and dependencies.
6. Validate against the BIA.

## Workflow
BIA requirements \u2192 options \u2192 selection \u2192 provision \u2192 validate.

## Key Controls
| Control | Standard |
|---|---|
| Meet RTO/RPO | Redundancy; frequent backups; tested restore |
| Site loss | Remote-work + alternate site |
| Staffing | Cross-training; on-call |
| Platform | Provider resilience + failover |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Strategies meeting BIA targets | 100% |
| Provisioned resources ready | 100% |

## Required Records
The strategy document and resource provisioning records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},plans:{title:"Business Continuity Plans",clause:"8.4",content:`# Business Continuity Plans
_ISO 22301:2019 \u2014 Clause 8.4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to provide documented procedures to continue and recover critical activities, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define activation criteria and authority.
2. Establish the incident response team and roles.
3. Set out communications (staff, \${c.CUST}, suppliers).
4. Document recovery procedures per critical activity to meet RTO/RPO.
5. List resources and dependencies.
6. Define return-to-normal criteria.

## Workflow
Activation \u2192 mobilize team \u2192 communicate \u2192 recover per procedure \u2192 return to normal.

## Key Controls
| Control | Standard |
|---|---|
| Activation criteria | Defined & authorized |
| Team & roles | Named |
| Communications | Pre-drafted |
| Recovery procedures | Per critical activity |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Plans covering critical activities | 100% |
| Plans accessible during disruption | Yes |

## Required Records
Continuity plans, contact lists, and recovery procedures. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},incident:{title:"Incident Response Structure",clause:"8.4.2",content:`# Incident Response Structure
_ISO 22301:2019 \u2014 Clause 8.4.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to provide a defined structure to respond to disruptive incidents, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Detect and assess the incident's severity.
2. Activate the response structure and escalate.
3. Establish command, safety and communications.
4. Coordinate recovery per the plans.
5. Communicate with \${c.CUST} and stakeholders.
6. Stand down and review after resolution.

## Workflow
Detect \u2192 assess \u2192 activate \u2192 command \u2192 recover \u2192 communicate \u2192 stand down \u2192 review.

## RACI Matrix
| Activity | Incident Manager | Team | Manager | Executive |
|---|---|---|---|---|
| Assess & declare | A | R | C | I |
| Activate response | A | R | C | I |
| Coordinate recovery | R | R | A | I |
| Stakeholder comms | R | C | A | C |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Incident Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.

_ISO 22301:2019 \u2014 Clause 8.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to validate the plans and build capability through a programme of exercises, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Plan a programme of exercises across plan types.
2. Run tabletop walkthroughs of the plans.
3. Run technical recovery / failover tests.
4. Test communications and notifications.
5. Capture findings and lessons.
6. Update plans and re-test as needed.

## Workflow
Plan programme \u2192 tabletop \u2192 technical test \u2192 comms test \u2192 findings \u2192 update.

## Key Controls
| Control | Standard |
|---|---|
| Plan walkthrough | Semi-annual |
| Recovery / failover | Annual |
| Communications test | Annual |
| Findings | Tracked to closure |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Exercises completed | Per programme |
| Recovery within RTO in tests | 100% |

## Required Records
Exercise plans, results, and improvement actions. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},performance:{title:"Performance Evaluation",clause:"9.1",content:`# Performance Evaluation

_ISO 22301:2019 \u2014 Clause 9.2 \xB7 Meridian Federal Solutions_

_ISO/IEC 42001:2023 \u2014 Clause 5.2 \xB7 Meridian Federal Solutions_

Meridian Federal Solutions, LLC develops and uses AI systems responsibly in delivering the Enterprise IT Service Desk (EITSD) contract, under an AIMS conforming to ISO/IEC 42001:2023.

- Assess AI risks and impacts on people and society.
- Ensure human oversight, transparency and data governance.
- Manage AI across its lifecycle.
- Meet legal and ethical obligations; continually improve.

| Version | Date | Approved by |
|---|---|---|
| 1.0 | (current) | Program Manager |`},aimsscope:{title:"AIMS Scope",clause:"4.3",content:`# Scope of the AIMS

_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure AI is built and run on appropriate, well-governed data, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Document data sources and permitted uses.
2. Validate data quality for the AI purpose.
3. Exclude sensitive data unless controlled.
4. Record data provenance.
5. Apply retention and disposal rules.
6. Review data governance on AI change.

## Workflow
Source \u2192 permitted use \u2192 quality check \u2192 provenance \u2192 retention \u2192 review.

## Key Controls
| Control | Standard |
|---|---|
| Data sources | Documented; permitted use |
| Data quality | Validated |
| Sensitive data | Controlled / excluded |
| Provenance | Recorded |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| AI systems with documented data lineage | 100% |
| Sensitive-data exposure to AI | 0 |

## Required Records
Data source register, quality checks, and provenance records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},soa:{title:"Statement of Applicability (Annex A)",clause:"6.1.3",content:`# Statement of Applicability
_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions_

This Statement of Applicability lists the ISO/IEC 42001:2023 Annex A controls, their applicability to the AI management system for the Enterprise IT Service Desk (EITSD) contract, and how each is implemented. Exclusions are justified by the AI risk and impact assessments.

### A.2 Policies related to AI

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.2.2 | AI policy | Yes | AI Management Policy approved by top management and communicated |
| A.2.3 | Alignment with other organizational policies | Yes | AI policy aligned with security, privacy, and quality policies |
| A.2.4 | Review of the AI policy | Yes | AI policy reviewed at least annually and on significant change |

### A.3 Internal organization

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.3.2 | AI roles and responsibilities | Yes | AI Owner, reviewers, and Security Lead roles defined and assigned |
| A.3.3 | Reporting of concerns | Yes | Channel provided to report AI concerns and issues |

### A.4 Resources for AI systems

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.4.2 | Resource documentation | Yes | AI resources (data, tooling, compute, people) documented |
| A.4.3 | Data resources | Yes | Data resources for AI documented and governed |
| A.4.4 | Tooling resources | Yes | AI tools and models inventoried |
| A.4.5 | System and computing resources | Yes | Compute and hosting resources documented |
| A.4.6 | Human resources | Yes | Competence for AI oversight defined and resourced |

### A.5 Assessing impacts of AI systems

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.5.2 | AI system impact assessment process | Yes | Documented impact-assessment process performed before deployment |
| A.5.3 | Documentation of AI system impact assessments | Yes | Impact assessments recorded and retained |
| A.5.4 | Assessing impact on individuals or groups | Yes | Impacts on individuals assessed (harms, bias, recourse) |
| A.5.5 | Assessing societal impacts | Yes | Broader societal impacts assessed and mitigated |

### A.6 AI system life cycle

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.6.1.2 | Objectives for responsible development | Yes | Responsible-AI objectives defined for development |
| A.6.1.3 | Processes for responsible design and development | Yes | Design/development follows responsible-AI processes |
| A.6.2.2 | AI system requirements and specification | Yes | Requirements including safety, fairness, and oversight specified |
| A.6.2.3 | Documentation of design and development | Yes | Design and development documented |
| A.6.2.4 | AI system verification and validation | Yes | Performance and fairness validated before deployment |
| A.6.2.5 | AI system deployment | Yes | Deployment with human oversight and rollback |
| A.6.2.6 | AI system operation and monitoring | Yes | Accuracy and drift monitored in operation |
| A.6.2.7 | AI system technical documentation | Yes | Technical documentation maintained |
| A.6.2.8 | AI system recording of event logs | Yes | AI event logs recorded and retained |

### A.7 Data for AI systems

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.7.2 | Data for development and enhancement | Yes | Data used for AI documented and permitted |
| A.7.3 | Acquisition of data | Yes | Data acquisition controlled and lawful |
| A.7.4 | Quality of data for AI systems | Yes | Data quality validated for the AI purpose |
| A.7.5 | Data provenance | Yes | Provenance of AI data recorded |
| A.7.6 | Data preparation | Yes | Data preparation documented and controlled |

### A.8 Information for interested parties

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.8.2 | System documentation and information for users | Yes | Users informed AI is assisting; usage documented |
| A.8.3 | External reporting | Yes | External reporting mechanism provided |
| A.8.4 | Communication of incidents | Yes | AI incidents communicated to affected parties |
| A.8.5 | Information for interested parties | Yes | Interested parties given relevant AI information |

### A.9 Use of AI systems

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.9.2 | Processes for responsible use | Yes | Responsible-use processes defined |
| A.9.3 | Objectives for responsible use | Yes | Responsible-use objectives set and tracked |
| A.9.4 | Intended use of the AI system | Yes | Intended use defined; misuse controls in place |

### A.10 Third-party and customer relationships

| Control | Title | Applicable | Implementation |
|---|---|---|---|
| A.10.2 | Allocating responsibilities | Yes | Responsibilities allocated across third parties |
| A.10.3 | Suppliers | Yes | AI supplier assurance obtained where used |
| A.10.4 | Customers | Yes | Customer obligations and information addressed |

All 38 Annex A controls are applicable and implemented as above, confirmed by the AI risk and impact assessments.`},lifecycle:{title:"AI System Lifecycle Controls",clause:"Annex A",content:`# AI System Lifecycle Management
_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to manage AI systems responsibly across design, deployment, operation and retirement, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define intended use and requirements.
2. Assess risk and impact before build/procurement.
3. Validate performance and fairness before deployment.
4. Deploy with human oversight and monitoring.
5. Monitor accuracy and drift in operation.
6. Retire or retrain when performance degrades.

## Workflow
Define \u2192 assess \u2192 validate \u2192 deploy (oversight) \u2192 monitor \u2192 retrain/retire.

## Key Controls
| Control | Standard |
|---|---|
| Pre-deployment validation | Performance & fairness |
| Oversight | Human-in-the-loop |
| Monitoring | Accuracy & drift |
| Retirement | On degradation |

## Roles & Responsibilities
- **AI Owner** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| AI systems validated pre-deployment | 100% |
| Monitored in operation | 100% |

## Required Records
Validation reports, monitoring logs, and change/retirement records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},oversight:{title:"Human Oversight & Transparency",clause:"Annex A",content:`# Human Oversight & Transparency
_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions_

- AI suggestions are reviewed by a human before acting where impact is material.
- Users are informed when AI assists them.
- A human escalation path is always available.
- AI performance is monitored; humans can override or disable AI.

| Control | Standard |
|---|---|
| Human review | Material actions |
| Disclosure | Users informed of AI |
| Override | Always available |
| Kill switch | AI can be disabled |`},monitoring:{title:"Monitoring, Measurement & Evaluation",clause:"9.1",content:`# Monitoring, Measurement, Analysis & Evaluation
_ISO/IEC 42001:2023 \u2014 Clause 9.1 \xB7 Meridian Federal Solutions_

| What is measured | Method | Frequency | Owner |
|---|---|---|---|

_SOC 2 (AICPA TSC) \xB7 Meridian Federal Solutions_

## Services
Meridian Federal Solutions, LLC provides the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce, on ServiceNow, supporting ~9,200 users across 14 sites.

## System components
| Component | Examples |
|---|---|
| Infrastructure | Cloud hosting, networks |
| Software | ServiceNow, endpoint tools |
| People | Service desk, security, management |
| Procedures | Documented policies & processes |
| Data | Customer and operational data |

## Boundaries
People, processes and technology used to deliver the service. Subservice organizations (cloud/hosting) are covered via the carve-out method and vendor management.

## Trust Services Categories in scope
Security (Common Criteria), Availability, and Confidentiality.`},controlmatrix:{title:"Control Matrix (Common Criteria)",clause:"CC1\u2013CC9",content:`# Control Matrix \u2014 Common Criteria

_SOC 2 (AICPA TSC) \u2014 CC4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor that controls are present and operating effectively, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define control monitoring activities.
2. Collect evidence of control operation.
3. Perform internal control reviews / audits.
4. Track deficiencies to remediation.
5. Report control status to management.
6. Improve controls based on findings.

## Workflow
Define monitoring \u2192 collect evidence \u2192 review \u2192 remediate \u2192 report.

## Key Controls
| Control | Standard |
|---|---|
| Continuous monitoring | Security & availability |
| Internal review | Periodic |
| Deficiency tracking | To closure |
| Reporting | To management |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Controls monitored | 100% |
| Deficiencies remediated on time | \u2265 90% |

## Required Records
Monitoring results, review reports, and remediation tracking. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},access:{title:"Logical & Physical Access",clause:"CC6",content:`# Logical & Physical Access
_SOC 2 (AICPA TSC) \u2014 CC6 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to restrict logical and physical access to authorized users and protect information assets, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Provision access via RBAC and least privilege (CC6.1).
2. Require MFA for remote and privileged access.
3. Review access rights periodically (CC6.2).
4. Deprovision on termination (CC6.3).
5. Control physical access to facilities (CC6.4).
6. Encrypt data in transit and at rest (CC6.7).

## Workflow
Provision (RBAC+MFA) \u2192 review \u2192 deprovision \u2192 physical controls \u2192 encryption.

## Key Controls
| Control | Standard |
|---|---|
| Access provisioning | RBAC; least privilege |
| Authentication | MFA |
| Access reviews | Quarterly |
| Encryption | In transit & at rest |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Access reviews completed | 100% quarterly |
| MFA coverage (remote/privileged) | 100% |

## Required Records
Access records, review logs, and encryption configuration. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},operations:{title:"System Operations & Incident Response",clause:"CC7",content:`# System Operations & Incident Response
_SOC 2 (AICPA TSC) \u2014 CC7 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to detect, respond to, and recover from security and availability incidents, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Monitor systems for anomalies and threats (CC7.1\u20137.2).
2. Detect and classify incidents.
3. Contain, eradicate and recover (CC7.3\u20137.4).
4. Notify affected parties (CC7.5).
5. Preserve evidence and review post-incident.
6. Improve controls from lessons learned.

## Workflow
Monitor \u2192 detect \u2192 contain \u2192 recover \u2192 notify \u2192 review.

## Key Controls
| Control | Standard |
|---|---|
| Monitoring | Security & availability |
| Incident handling | Detect\u2192respond\u2192recover |
| Communication | Affected parties |
| Post-incident review | For majors |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Incidents reviewed | 100% |
| Mean time to respond | Within target |

## Required Records
Monitoring config, incident tickets, and post-incident reviews. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},change:{title:"Change Management",clause:"CC8",content:`# Change Management
_SOC 2 (AICPA TSC) \u2014 CC8 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to authorize, test and control changes to infrastructure and software, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Record and classify each change.
2. Assess risk and test before production.
3. Obtain approval.
4. Separate development and production.
5. Deploy with back-out readiness.
6. Review changes for success.

## Workflow
Request \u2192 test \u2192 approve \u2192 deploy (dev/prod separation) \u2192 verify.

## Key Controls
| Control | Standard |
|---|---|
| Change request | Documented |
| Testing & approval | Before production |
| Segregation | Dev/prod separation |
| Back-out | Defined |

## Roles & Responsibilities
- **Ops Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Changes with approval & test | 100% |
| Change-related incidents | Downward trend |

## Required Records
Change tickets, approvals, and test records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},vendor:{title:"Vendor / Risk Mitigation",clause:"CC9",content:`# Vendor Management & Risk Mitigation

1. Assess vendors before engagement.
2. Review vendor assurance (SOC 2 / ISO reports).
3. Include security terms in contracts.

5. Maintain risk-transfer measures (e.g. insurance).
6. Offboard vendors securely.

.cf-land{--lp:#F5F2EA;--lp2:#FFFFFF;--ldot:#E4DFD1;--li:#151B24;--li2:#565F6B;--li3:#949BA6;--lline:#E7E2D5;--lline2:#D6D0C0;--lnavy:#132038;--lnavy2:#1E3252;--lbrass:#B4842B;--lbrass2:#D2A343;--lbrasss:#F6EDD5;--lbrassl:#E6D3A3;--lem:#1F7A5C;--lem2:#2FA37E;--lems:#E3F2EB;background:var(--lp);color:var(--li);background-image:radial-gradient(var(--ldot) 1px,transparent 1px);background-size:22px 22px;font-family:'IBM Plex Sans',system-ui,sans-serif;height:100%;overflow-y:auto;overflow-x:hidden}

.cf-land .hero{padding:46px 20px 0;text-align:center}

.cf-land .yb .o{padding:2px 9px;border-radius:999px;background:var(--lnavy);color:var(--lbrass2);font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.cf-land h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(40px,10.2vw,54px);line-height:1.03;letter-spacing:-.02em;color:var(--li)}
.cf-land h1 em{font-style:italic;color:var(--lbrass)}

.cf-land .cta{margin-top:28px;background:var(--lnavy);color:#fff;border:0;border-radius:999px;padding:18px 30px;font-size:16px;font-weight:600;display:inline-flex;align-items:center;gap:11px;box-shadow:0 12px 30px rgba(19,32,56,.24)}
.cf-land .cta:hover{background:var(--lnavy2)}
.cf-land .cta svg{width:17px;height:17px;stroke:var(--lbrass2);fill:none;stroke-width:2}
.cf-land .meta{margin-top:18px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px 18px;font-size:13.5px;color:var(--li2)}
.cf-land .meta span{display:inline-flex;align-items:center;gap:7px}
.cf-land .meta svg{width:14px;height:14px;stroke:var(--lem);fill:none;stroke-width:2}

.cf-land .asmh{display:flex;align-items:center;justify-content:space-between}

.cf-land .asmh .dt{display:flex;gap:5px}.cf-land .asmh .dt i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18)}
.cf-land .fwrow{display:flex;gap:7px;overflow-x:auto;margin-top:16px;padding-bottom:4px;scrollbar-width:none}
.cf-land .fwrow::-webkit-scrollbar{display:none}
.cf-land .fw{flex:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#C6D0DE;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;white-space:nowrap}
.cf-land .fw.on{background:var(--lbrass2);border-color:var(--lbrass2);color:var(--lnavy)}
.cf-land .panel{margin-top:18px;background:var(--lp2);border-radius:16px;padding:20px 18px;position:relative;box-shadow:0 18px 40px rgba(9,16,30,.4)}
.cf-land .ph{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;border-bottom:1px solid var(--lline);padding-bottom:14px}
.cf-land .std{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:1.1;color:var(--li)}
.cf-land .ptag{font-size:13px;color:var(--li2);margin-top:3px}
.cf-land .cov{text-align:right;flex:none}
.cf-land .cov b{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;color:var(--lnavy);display:block;line-height:1}
.cf-land .cov span{font-size:11px;color:var(--li3);font-family:'IBM Plex Mono',monospace}
.cf-land .dl{margin-top:14px;display:grid;gap:8px}

.cf-land .stw{position:absolute;top:14px;right:14px;pointer-events:none}

.cf-land .pf{margin-top:16px;border-top:1px dashed var(--lline2);padding-top:12px;display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--li2)}
.cf-land .pf b{color:var(--lnavy);font-weight:600}
.cf-land .rails{background:var(--lnavy);padding:22px 0 30px;overflow:hidden}
.cf-land .raill{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7E90AD;margin-bottom:16px}

.cf-land .sc{padding:56px 20px 0;text-align:center}

.cf-land h2{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(29px,7.3vw,38px);line-height:1.09;letter-spacing:-.018em;color:var(--li)}
.cf-land h2 em{font-style:italic;color:var(--lbrass)}
.cf-land .lede{color:var(--li2);font-size:16px;line-height:1.65;margin:18px auto 0;max-width:38ch}

.cf-land .col.does li svg{stroke:var(--lem)}.cf-land .col.dont li svg{stroke:var(--li3)}.cf-land .col.dont li{color:var(--li2)}
.cf-land .price{margin-top:22px;display:grid;gap:13px;text-align:left}
.cf-land .plan{background:var(--lp2);border:1px solid var(--lline);border-radius:20px;padding:22px 20px;position:relative}
.cf-land .plan.feat{border-color:var(--lbrassl);box-shadow:0 12px 34px rgba(180,132,43,.13)}
.cf-land .plan .bdg{position:absolute;top:-11px;left:20px;background:var(--lbrass2);color:var(--lnavy);font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;padding:4px 11px;border-radius:999px}
.cf-land .plan .pn{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--li2)}
.cf-land .plan .pp{font-family:'Fraunces',serif;font-weight:600;font-size:33px;margin-top:8px;color:var(--li)}
.cf-land .plan .pp span{font-family:'IBM Plex Sans';font-size:15px;font-weight:500;color:var(--li3)}
.cf-land .plan .pd{font-size:14px;color:var(--li2);margin-top:6px;line-height:1.5}
.cf-land .plan .pb{margin-top:16px;width:100%;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:600}
.cf-land .plan.feat .pb{background:var(--lnavy);color:#fff}
.cf-land .plan .pb.ghost{background:var(--lp);color:var(--li);border:1px solid var(--lline)}
.cf-land .final{margin:56px 0 0;background:var(--lnavy);border-radius:26px;padding:44px 26px;text-align:center;position:relative;overflow:hidden}
.cf-land .final h2{color:#fff}.cf-land .final h2 em{color:var(--lbrass2)}
.cf-land .final p{color:#A9B6C8;font-size:15.5px;margin:16px auto 0;max-width:34ch}
.cf-land .final .cta{margin-top:24px;background:var(--lbrass2);color:var(--lnavy)}
.cf-land .final .cta svg{stroke:var(--lnavy)}
.cf-land .final .fine{margin-top:16px;font-size:12.5px;color:#7E8CA0;font-family:'IBM Plex Mono',monospace}
.cf-land footer{padding:34px 20px 46px;text-align:center}
.cf-land footer .fl{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.cf-land footer .fl b{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--li)}
.cf-land footer .fnav{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 20px;font-size:14px;color:var(--li2)}
.cf-land footer .cp{margin-top:18px;font-size:12px;color:var(--li3);font-family:'IBM Plex Mono',monospace}
