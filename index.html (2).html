_ISO/IEC 20000-1:2018 \u2014 Clause 5.2 \xB7 ${e.ORG}_

## 1. Purpose
This policy sets out ${e.ORGFULL}'s commitment to delivering the ${e.CONTRACT} to ${e.CUST} under a service management system (SMS) conforming to ISO/IEC 20000-1:2018.

## 2. Scope
Applies to all services, personnel and processes supporting approximately ${e.USERS} users across ${e.SITES} sites, delivered on ${e.PLATFORM} (${e.HOURS}).

## 3. Policy Statements
- We manage services through defined, measurable and continually improving processes.
- We meet or exceed all contractual service levels and report performance transparently.
- We restore service quickly, reduce recurring incidents, and manage change safely.
- We protect customer information in line with applicable security and privacy obligations.
- We achieve and maintain ISO/IEC 20000-1 certification.

## 4. Authority & Approval
This policy is issued by top management, is communicated to all personnel, and is reviewed at least annually.

| Version | Date | Author | Approved by |
|---|---|---|---|
| 1.0 | (current) | ITSM / Quality Manager | Program Manager |`}),scope:e=>({title:"Scope Statement",clause:"4.3",content:`# Scope of the Service Management System
_ISO/IEC 20000-1:2018 \u2014 Clause 4.3 \xB7 ${e.ORG}_

**Organization:** ${e.ORGFULL}
**Customer:** ${e.CUST}
**Contract:** ${e.CONTRACT}
**Platform:** ${e.PLATFORM}

## Services in scope
Tier 1 and Tier 2 IT service desk and end-user support for approximately ${e.USERS} users across ${e.SITES} sites, delivered ${e.HOURS}.

## Processes in scope
Incident, service request, problem, change, configuration, asset, knowledge, capacity, availability, continuity, service level, supplier, release, monitoring & reporting, and continual improvement.

## Boundaries & exclusions
Underlying network and data-centre operations provided by the customer are interfaces to, not part of, this SMS. Where services are delivered by subcontractors, they are governed through Supplier Management.

## Governing standard
ISO/IEC 20000-1:2018, clauses 4\u201310.`}),context:e=>({title:"Context of the Organization",clause:"4.1",content:`# Context of the Organization
_ISO/IEC 20000-1:2018 \u2014 Clause 4.1 \xB7 ${e.ORG}_

The following internal and external issues are relevant to ${e.ORG}'s ability to deliver the ${e.CONTRACT} and are reviewed at each management review.

## External issues
| Issue | Relevance to the SMS |
|---|---|
| Contractual & regulatory obligations (customer policy, security mandates) | Drive required controls, reporting and certification |
| Customer expectations for uptime and responsiveness | Set service-level targets |
| Labour market for qualified service-desk staff | Affects staffing capacity and continuity |
| Technology change (${e.PLATFORM}, automation, AI) | Creates improvement opportunities and training needs |
| Cyber-threat landscape | Drives security and continuity requirements |

## Internal issues
| Issue | Relevance to the SMS |
|---|---|
| Maturity of ITSM tooling and processes | Affects consistency and audit-readiness |

## Purpose
Ensure the right version of each controlled document is available where needed and that obsolete versions are not used.

## Procedure
1. **Create** \u2014 the author drafts using the approved template.
2. **Review** \u2014 the ITSM/Quality Manager reviews for accuracy and completeness.
3. **Approve** \u2014 the accountable owner approves before publication.
4. **Version** \u2014 versions follow Major.Minor (e.g. 1.0, 1.1); version, date and approver are recorded.
5. **Distribute** \u2014 the approved version is published to the controlled repository.
6. **Review cycle** \u2014 each document is reviewed at least annually and on significant change.
7. **Retire** \u2014 superseded documents are marked obsolete and archived.

| Control | Rule |
|---|---|

_ISO/IEC 27001:2022 \u2014 Clause 6.1.2 \xB7 ${e.ORG}_

## Method
1. Identify information assets and their owners.
2. Identify threats and vulnerabilities for each asset.
3. Assess likelihood and impact on a defined scale (1\u20135).
4. Calculate risk = likelihood \xD7 impact; compare to the risk acceptance criteria.
5. Select treatment: mitigate (apply Annex A controls), transfer, avoid, or accept.
6. Record residual risk and obtain risk owner acceptance.

## Risk acceptance criteria
Risks scoring above the agreed threshold require treatment; residual risks are accepted by the risk owner and recorded.

This Service Management Policy sets out Meridian Federal Solutions' commitment to delivering IT service desk and end-user support to the U.S. Department of Commerce under a service management system (SMS) aligned to ISO/IEC 20000-1:2018.

## 2. Scope
Applies to all services, personnel and processes supporting the ~9,200 users across 14 sites under the Enterprise IT Service Desk (EITSD) contract, operated within ServiceNow.

## 3. Policy Statements
- We manage services through defined, measurable and continually improving processes.
- We meet or exceed all contractual service levels and report performance transparently.
- We restore service quickly, reduce recurring incidents, and manage change safely.
- We protect Government information per FISMA, NIST SP 800-53 and Department policy.
- We achieve and maintain ISO/IEC 20000-1 certification.

## 4. Roles & Responsibilities
| Role | Responsibility |
|---|---|
| Program Manager | Accountable for the SMS and the Government relationship |
| Service Delivery Manager | Owns day-to-day operations and SLA performance |
| ITSM / Quality Manager | Maintains the SMS, internal audits and improvement |

## 5. Review & Approval
Reviewed at least annually and upon significant change.

_ISO/IEC 20000-1:2018 \u2014 Clause 8.6.1_

## Policy
Meridian restores normal service as quickly as possible following any unplanned interruption, minimizing impact to the ~9,200 Department of Commerce users. All incidents are recorded, prioritized and managed to resolution in ServiceNow.

## Procedure
1. **Detect & log** \u2014 capture every incident (phone, email, chat, portal) as a ticket.
2. **Categorize & prioritize** \u2014 apply the P1-P4 priority matrix (impact x urgency).
3. **Investigate & diagnose** \u2014 Tier 1 attempts first-contact resolution; else escalate to Tier 2.
4. **Resolve & recover** \u2014 apply fix or workaround; confirm service restored with the user.
5. **Close** \u2014 document resolution, confirm satisfaction, close ticket.
6. **Major incidents (P1)** \u2014 invoke bridge, assign Major Incident Manager, send stakeholder comms every 30 min.

## Workflow (step-by-step)
User contact -> Log ticket -> Categorize/Prioritize -> Tier 1 triage -> (resolved? close : escalate Tier 2) -> Resolve -> Confirm with user -> Close -> feed recurring issues to Problem Management.

## RACI Matrix
| Activity | Tier 1 | Tier 2 | Major Incident Mgr | SDM |
|---|---|---|---|---|
| Log & categorize | R | C | I | A |
| Prioritize | R | C | C | A |
| Resolve P3/P4 | R | C | I | A |
| Resolve P1/P2 | C | R | A | A |
| Stakeholder comms (P1) | I | I | R | A |

## Roles & Responsibilities
- **Tier 1 Analyst** \u2014 logging, triage, first-contact resolution.
- **Tier 2 Technician** \u2014 deeper diagnosis and desk-side support.
- **Major Incident Manager** \u2014 coordinates P1 response and communications.
- **Service Delivery Manager** \u2014 accountable for incident performance.

## Inputs & Outputs
**Inputs:** user contacts, monitoring alerts, event records, known errors.

## Required Records & Forms

_ISO/IEC 20000-1:2018 \u2014 Clause 8.4.3_
_Meridian Federal Solutions, LLC \xB7 Enterprise IT Service Desk (EITSD) \xB7 U.S. Department of Commerce_

## Policy
Meridian Federal Solutions ensures that the IT service desk and end-user services delivered to the Department of Commerce have sufficient capacity \u2014 human, technical, and platform \u2014 to meet agreed service levels now and over the planning horizon, at justifiable cost. Capacity is planned proactively against demand rather than reacting to shortfalls. This policy applies to the ServiceNow ITSM platform, the contact center telephony, the self-service portal, and the staffing model supporting approximately 9,200 users across 14 sites. Capacity decisions are evidence-based, documented, reviewed at least quarterly, and fed into budgeting and the continual improvement process.

## Procedure
1. **Establish capacity requirements.** Translate contractual service levels (ASA \u2264 30s, FCR \u2265 70%, P1 resolution \u2264 4h, self-service availability \u2265 99.5%) and forecast demand into concrete capacity targets for staffing, telephony lines, and platform resources.
2. **Monitor current capacity and utilization.** Collect utilization data continuously from ServiceNow, the ACD/telephony platform, and portal monitoring (see Inputs).
3. **Analyze and forecast.** Each month, compare utilization and demand trends against targets; project 3, 6, and 12 months forward, accounting for onboarding waves, seasonal peaks (open season, fiscal year-end), and site changes.
4. **Identify capacity risks.** Flag any resource trending toward a threshold breach and log it in the capacity risk section of the risk register.
5. **Plan and recommend actions.** Produce options (add staff, adjust shifts, expand licenses/lines, tune workflows) with cost and lead-time; route to budgeting and the Service Delivery Manager.
6. **Approve and implement.** Approved changes flow through Change Enablement (clause 8.5.1) before production.
7. **Review effectiveness.** Confirm the action resolved the constraint; update the Capacity Plan and report results at the monthly service review and quarterly management review.

## Workflow (step-by-step)
Collect utilization data \u2192 Compare to targets \u2192 Forecast demand (3/6/12 mo) \u2192 Constraint approaching? \u2192 **No:** record and continue monitoring \u2192 **Yes:** analyze options with cost & lead-time \u2192 Recommend in Capacity Plan \u2192 Approve via CAB \u2192 Implement change \u2192 Verify service levels restored \u2192 Update Capacity Plan \u2192 Report at service review.

## RACI Matrix
| Activity | Capacity Analyst | Service Delivery Manager | Program Manager | Customer (COR) |
|---|---|---|---|---|
| Monitor utilization & collect data | R | A | I | I |
| Forecast demand | R | A | C | C |
| Identify capacity risks | R | A | I | I |
| Produce Capacity Plan | R | A | C | I |
| Approve capacity investment | C | R | A | C |
| Implement approved change | C | A | I | I |
| Report performance | R | A | I | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Capacity Analyst** \u2014 monitors utilization, forecasts demand, maintains the Capacity Plan, raises capacity risks.
- **Service Delivery Manager** \u2014 accountable for capacity meeting service levels; approves operational actions; owns the plan.
- **Program Manager** \u2014 approves capacity investments with budget impact; interfaces with the Government.
- **Contracting Officer's Representative (COR)** \u2014 consulted on demand changes (new sites, headcount, mission surges).

## Inputs & Outputs
**Inputs:** ServiceNow ticket volumes and trends; ACD/telephony statistics (call volumes, ASA, abandonment, concurrency); self-service portal usage and availability; staffing rosters and schedules; ServiceNow license/instance utilization; onboarding/offboarding forecasts; known upcoming projects and mission events; historical seasonal patterns.

**Outputs:** the Capacity Plan; monthly capacity report; capacity risk entries; investment/change recommendations; updated forecasts; inputs to budgeting (clause 8.4.1) and continual improvement (clause 10.2).

## KPIs & Targets
| KPI | Definition | Target |
|---|---|---|
| Capacity-related SLA breaches | SLA misses attributable to insufficient capacity | 0 per quarter |
| Forecast accuracy | Actual vs. forecast demand (\xB1 variance) | Within \xB1 10% |
| Telephony headroom at peak | Spare concurrent-call capacity at busiest hour | \u2265 15% |
| Staffing coverage vs. schedule | Scheduled agents \xF7 required agents (Erlang-based) | \u2265 100% in all intervals |
| Self-service portal availability | Monthly uptime of the portal | \u2265 99.5% |
| Capacity Plan currency | Plan reviewed and updated on schedule | Quarterly, 100% on time |

## Risks & Controls
| Risk | Impact | Control |
|---|---|---|
| Onboarding wave spikes ticket volume beyond staffing | P1/P2 SLA breaches, long queues | Demand forecast tied to HR onboarding calendar; flex/on-call staffing plan |
| Telephony concurrency saturates at peak | High ASA, abandonment > 5% | Peak headroom target \u2265 15%; ACD monitoring with alert thresholds |
| ServiceNow license/instance limits reached | Ticketing degraded or blocked | Monthly license utilization review; renewal lead-time tracked |
| Self-service portal outage during peak | Availability < 99.5%, demand shifts to phones | Redundancy and monitoring; capacity buffer on dependent services |
| Forecast inaccuracy | Over- or under-provisioning, cost or SLA risk | Monthly forecast-accuracy KPI; rolling recalibration |

## Required Records & Forms
- **Capacity Plan** (living document; reviewed quarterly) \u2014 retained for the life of the contract plus one option year.
- **Monthly Capacity Report** \u2014 retained 24 months.
- **Capacity forecast worksheets** (staffing/Erlang, telephony, license) \u2014 retained 24 months.
- **Capacity risk log entries** \u2014 retained until closed plus 12 months.
- **Capacity investment/change recommendations and approvals** \u2014 retained per Records Management Procedure (clause 7.5).

## Templates & Work Instructions
- **Capacity Plan template** \u2014 scope, current capacity baseline, demand forecast (3/6/12 mo), constraints, recommended actions, cost/lead-time, review log.
- **Monthly Capacity Report template** \u2014 utilization vs. target by resource, forecast vs. actual, risks, actions, KPI summary.
- **Work Instruction: monthly capacity review** \u2014 data pull steps from ServiceNow and the ACD, calculation method, threshold checks, sign-off.
- **Work Instruction: staffing (Erlang C) calculation** \u2014 inputs, tool/formula, interval coverage check, escalation if coverage < 100%.

---
_Revision 1.0 \xB7 Prepared by Capacity Analyst \xB7 Approved by Service Delivery Manager. Reviewed at least quarterly and upon significant change to demand, scope, or the operating environment._

_ISO/IEC 20000-1:2018 \u2014 Clause 8.6.1 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to restore normal service operation as quickly as possible after any unplanned interruption. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Detect and log every incident in ServiceNow with impact and urgency.
2. Categorise and set priority P1\u2013P4 using the priority matrix.
3. Attempt first-contact resolution at Tier 1; escalate to Tier 2 where criteria are met.
4. For P1/major incidents, invoke the major-incident procedure and open a bridge.
5. Keep users informed; restore service and confirm resolution with the user.
6. Close with a documented resolution and raise a problem where warranted.

## Workflow
User contact or monitoring alert \u2192 log & categorise \u2192 prioritise \u2192 diagnose/resolve or escalate \u2192 (major-incident bridge if P1) \u2192 restore & confirm \u2192 close \u2192 feed problem & reporting.

## RACI Matrix
| Activity | Incident Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Log & categorise the incident | A | R | C | I |
| Prioritise & assign | A | R | C | I |
| Resolve or escalate | R | R | A | I |
| Coordinate a major (P1) incident | A | C | R | I |
| Communicate to users & customer | R | C | A | C |
| Review trends & report | R | C | A | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Incident Manager** \u2014 owns and runs Incident Management; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** user contacts, monitoring alerts, known errors.
**Outputs:** restored service, incident records, problem candidates, SLA data.

## KPIs & Targets
| KPI | Target |
|---|---|
| First Contact Resolution | \u2265 70% |
| P1 resolution within SLA | \u2265 95% |
| Reopen rate | \u2264 5% |

## Risks & Controls
| Risk | Control |
|---|---|
| P1 raised outside core hours | Coverage aligned to contracted hours; on-call escalation for P1 |
| Mis-prioritised tickets | Priority matrix + monthly QA sampling |

## Required Records
Incident tickets, major-incident reports, user communications, and the monthly incident report. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Incident Manager, approved by the Service Delivery Manager.`},proc_request:{title:"Service Request Management \u2014 Full Pack",clause:"8.6.2",content:`# Service Request Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.6.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to fulfil standard service requests through a published catalogue within agreed timeframes. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Publish request types in the ServiceNow service catalogue with descriptions and target times.
2. Log and validate each request against catalogue entitlements.
3. Route for approval where the request type requires it.
4. Fulfil using the standard model for that request type.
5. Confirm completion with the requester and capture satisfaction.
6. Update the catalogue or knowledge base where a gap is revealed.

## Workflow
Catalogue request \u2192 validate \u2192 approval (if required) \u2192 fulfil per standard model \u2192 confirm with requester \u2192 close & capture satisfaction.

## RACI Matrix
| Activity | Request Fulfilment Lead | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Maintain the service catalogue | A | C | R | I |
| Validate & route the request | A | R | C | I |
| Approve (where required) | I | I | R | A |
| Fulfil the request | R | R | A | I |
| Confirm & close | R | R | A | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Request Fulfilment Lead** \u2014 owns and runs Service Request Management; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** catalogue requests, approvals, entitlements.
**Outputs:** fulfilled requests, provisioning records, satisfaction data.

## KPIs & Targets
| KPI | Target |
|---|---|
| Fulfilment within SLA | \u2265 90% |
| Catalogue coverage of routine requests | \u2265 95% |
| Approval cycle time | \u2264 1 business day |

## Risks & Controls
| Risk | Control |
|---|---|
| Approvals delay fulfilment | Defined approval matrix in the tool |
| Off-catalogue requests bypass the process | Quarterly catalogue review and intake control |

## Required Records
Request records, approval logs, catalogue definitions, and the monthly request report. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Request Fulfilment Lead, approved by the Service Delivery Manager.`},proc_problem:{title:"Problem Management \u2014 Full Pack",clause:"8.6.3",content:`# Problem Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.6.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to reduce recurring and high-impact incidents by finding and removing root causes. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Identify problems from incident trends, major incidents and monitoring.
2. Log and prioritise the problem by impact and recurrence.
3. Perform root-cause analysis using a structured method (e.g. 5 Whys, Ishikawa).
4. Record known errors and workarounds in the known-error database.
5. Raise changes to implement permanent fixes and track them to closure.
6. Verify effectiveness after the fix and close the problem.

## Workflow
Incident trend / major incident \u2192 log problem \u2192 root-cause analysis \u2192 known error + workaround \u2192 change for permanent fix \u2192 verify \u2192 close.

## RACI Matrix
| Activity | Problem Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Identify & log problems | A | R | C | I |
| Perform root-cause analysis | A | R | C | I |
| Maintain the known-error database | R | R | C | I |
| Raise permanent-fix changes | R | C | A | I |
| Verify effectiveness & close | R | C | A | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Problem Manager** \u2014 owns and runs Problem Management; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.

## Inputs & Outputs

|---|---|

_ISO/IEC 20000-1:2018 \u2014 Clause 8.5.1 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to make changes with the least disruption and risk while enabling needed change quickly. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Record and classify each change as standard, normal or emergency.
2. Assess risk and impact and define a back-out plan.
3. Route normal changes to the Change Advisory Board (CAB) for approval.
4. Schedule approved changes to minimise disruption and communicate to stakeholders.
5. Implement with the back-out plan ready and verify success.
6. Conduct a post-implementation review (PIR) and capture lessons.

## Workflow
Change request \u2192 classify \u2192 risk/impact + back-out plan \u2192 CAB approval (normal) \u2192 schedule & communicate \u2192 implement \u2192 verify \u2192 post-implementation review.

## RACI Matrix
| Activity | Change Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Raise & classify the change | I | R | A | I |
| Assess risk & impact | A | R | C | I |
| Approve at CAB | C | I | R | A |
| Implement with back-out | R | R | A | I |
| Post-implementation review | A | C | R | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Change Manager** \u2014 owns and runs Change Enablement; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** change requests, release plans, risk assessments.
**Outputs:** approved & scheduled changes, back-out plans, PIR results.

## KPIs & Targets
| KPI | Target |
|---|---|
| Change success rate | \u2265 98% |
| Emergency changes | \u2264 5% of total |
| Unauthorised changes | 0 |

## Risks & Controls
| Risk | Control |
|---|---|
| Change causes an outage | Risk assessment + back-out plan + CAB approval |
| Process bypass / unauthorised change | Discovery reconciliation and audit trail |

## Required Records
Change records, CAB minutes, risk assessments and back-out plans, and PIR reports. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Change Manager, approved by the Service Delivery Manager.`},proc_config:{title:"Configuration Management \u2014 Full Pack",clause:"8.2.6",content:`# Configuration Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.2.6 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to maintain accurate information about configuration items (CIs) and their relationships. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Define CI types, attributes and relationships in the CMDB model.
2. Identify, record and baseline CIs.
3. Control changes to CI records through Change Enablement.
4. Run automated discovery and reconcile against the CMDB monthly.
5. Audit CMDB accuracy and correct discrepancies.
6. Report CMDB health and coverage.

## Workflow
CI model \u2192 identify & baseline CIs \u2192 control via change \u2192 discovery & reconciliation \u2192 accuracy audit \u2192 report.

## RACI Matrix
| Activity | Configuration Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Define the CI model | A | C | R | I |
| Record & baseline CIs | A | R | C | I |
| Reconcile against discovery | R | R | C | I |
| Audit CMDB accuracy | A | R | C | I |
| Report CMDB health | R | C | A | I |

## Roles & Responsibilities

- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs

## KPIs & Targets
| KPI | Target |
|---|---|

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Configuration Manager, approved by the Service Delivery Manager.`},proc_asset:{title:"Asset Management \u2014 Full Pack",clause:"8.2.5",content:`# Asset Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.2.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to manage IT assets across their lifecycle to control cost, risk and compliance. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Record assets at receipt with owner, location and status.
2. Track assignment, moves and status changes through the lifecycle.
3. Manage software licences and entitlements and reconcile against usage.
4. Perform scheduled inventory reconciliation.
5. Manage secure retirement and disposal per policy.
6. Report asset and licence position.

Receipt \u2192 assign & track \u2192 licence management \u2192 inventory reconciliation \u2192 secure disposal \u2192 report.

Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Asset Manager, approved by the Service Delivery Manager.`},proc_knowledge:{title:"Knowledge Management \u2014 Full Pack",clause:"7.6",content:`# Knowledge Management
_ISO/IEC 20000-1:2018 \u2014 Clause 7.6 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to capture, share and improve knowledge to raise first-contact resolution and self-service success. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Identify knowledge needs from incident and request trends.
2. Create and review articles using Knowledge-Centered Service (KCS).
3. Publish articles to agents and the self-service portal.
4. Maintain accuracy and retire stale content on a schedule.
5. Measure article usage, value and self-service deflection.
6. Feed gaps back into article creation.

## Workflow
Ticket trends \u2192 draft article (KCS) \u2192 review \u2192 publish (agent + portal) \u2192 measure use \u2192 review/retire.

## RACI Matrix
| Activity | Knowledge Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Identify knowledge needs | R | R | A | I |
| Create & review articles | A | R | C | I |
| Publish to the portal | A | R | C | I |
| Review & retire content | A | R | C | I |
| Measure value | R | C | A | I |

## Roles & Responsibilities

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Knowledge Manager, approved by the Service Delivery Manager.`},proc_capacity:{title:"Capacity Management \u2014 Full Pack",clause:"8.4.3",content:`# Capacity Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.4.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure sufficient staffing, telephony and platform capacity to meet service levels at justifiable cost. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Set capacity targets from SLAs and forecast demand, including onboarding calendars.
2. Monitor staffing, telephony/queue and platform utilisation.
3. Forecast 3, 6 and 12 months ahead.
4. Flag constraints as capacity risks with lead time and cost.
5. Recommend actions and implement via Change Enablement.
6. Review at the monthly capacity review.

## Workflow
SLA + demand \u2192 monitor utilisation \u2192 forecast \u2192 flag constraints \u2192 recommend \u2192 implement via change \u2192 review.

## RACI Matrix
| Activity | Capacity Analyst | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Set capacity targets | A | C | R | I |
| Monitor utilisation | A | R | C | I |
| Forecast demand | A | R | C | I |
| Recommend investment | R | C | A | C |
| Review capacity | R | C | A | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Capacity Analyst** \u2014 owns and runs Capacity Management; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** ticket/telephony/portal utilisation, staffing rosters, demand signals.
**Outputs:** capacity plan, forecasts, investment recommendations.

## KPIs & Targets
| KPI | Target |
|---|---|
| Capacity-related SLA breaches | 0 per quarter |
| Forecast accuracy | \xB1 10% |
| Peak telephony headroom | \u2265 15% |

## Risks & Controls
| Risk | Control |
|---|---|
| Onboarding spikes overwhelm staffing | Demand forecast tied to HR calendar; flex staffing |
| Telephony saturation at peak | Headroom target and queue alerts |

## Required Records
The capacity plan, the monthly capacity report, and forecast worksheets. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Capacity Analyst, approved by the Service Delivery Manager.`},proc_availability:{title:"Availability Management \u2014 Full Pack",clause:"8.7.1",content:`# Availability Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.7.1 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure services are available when users need them, meeting agreed availability targets. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Define availability requirements and targets from the SLAs.
2. Design for resilience; identify and remove single points of failure.
3. Monitor availability continuously with alert thresholds.
4. Analyse downtime and availability trends.
5. Drive improvements and test recovery.
6. Report availability against targets.

## Workflow
Requirements \u2192 resilient design \u2192 monitor \u2192 analyse downtime \u2192 improve & test \u2192 report.

## RACI Matrix
| Activity | Availability Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Define availability targets | A | C | R | I |
| Design for resilience | A | R | C | I |
| Monitor availability | R | R | A | I |
| Analyse downtime | A | R | C | I |
| Report availability | R | C | A | I |

Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Availability Manager, approved by the Service Delivery Manager.`},proc_continuity:{title:"Service Continuity Management \u2014 Full Pack",clause:"8.7.2",content:`# Service Continuity Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.7.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure services can be recovered and continued after a major disruption within agreed targets. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Assess continuity requirements and risks with the customer.
2. Agree recovery objectives (RTO and RPO).
3. Document continuity and recovery plans and run-books.
4. Provision recovery capability: staffing, alternate access and backups.
5. Test the plans at least annually and after major change.
6. Review after each test and update the plans.

## Workflow
Risk assessment \u2192 agree RTO/RPO \u2192 document plans \u2192 provision recovery \u2192 test \u2192 review & update.

## RACI Matrix
| Activity | Continuity Manager | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Assess continuity risk | A | C | R | I |
| Agree RTO/RPO with customer | C | I | R | A |
| Document recovery plans | A | R | C | I |
| Test the plans | A | R | C | I |
| Review & update | R | C | A | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities

- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs

| KPI | Target |
|---|---|

| Risk | Control |
|---|---|

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Continuity Manager, approved by the Service Delivery Manager.`},proc_slm:{title:"Service Level Management \u2014 Full Pack",clause:"8.3.3",content:`# Service Level Management
_ISO/IEC 20000-1:2018 \u2014 Clause 8.3.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to agree, monitor and report service levels and drive the service to meet them. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure

_ISO/IEC 20000-1:2018 \u2014 Clause 8.3.4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

_ISO/IEC 20000-1:2018 \u2014 Clause 8.5.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to plan, build, test and deploy releases so changes reach production reliably. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Release Manager, approved by the Service Delivery Manager.`},proc_monitoring:{title:"Monitoring & Reporting \u2014 Full Pack",clause:"9.1",content:`# Monitoring & Reporting
_ISO/IEC 20000-1:2018 \u2014 Clause 9.1 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor service performance and report it accurately to the customer and management. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Define what to measure from the SLAs and objectives.
2. Instrument dashboards in ServiceNow and telephony.
3. Collect and validate data with named data owners.
4. Produce the monthly report pack by the 5th business day.
5. Present at service and management reviews.
6. Feed findings into Continual Improvement.

## Workflow
Define measures \u2192 instrument \u2192 collect & validate \u2192 monthly report \u2192 review \u2192 improvement.

## RACI Matrix
| Activity | Reporting Analyst | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Define measures | A | C | R | I |
| Build dashboards | A | R | C | I |
| Validate data | A | R | C | I |
| Produce the report pack | A | R | C | I |
| Present at reviews | R | C | A | C |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Reporting Analyst** \u2014 owns and runs Monitoring & Reporting; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** SLA data, utilisation, satisfaction, event data.
**Outputs:** monthly reports, dashboards, trend analysis.

## KPIs & Targets
| KPI | Target |
|---|---|
| Report accuracy | \u2265 99% |
| Report timeliness | By 5th business day |
| Dashboard coverage of SLAs | 100% |

## Risks & Controls
| Risk | Control |
|---|---|
| Inaccurate data undermines trust | Validation checks and named data owners |
| Metrics without action | Reviews drive improvement actions |

## Required Records
Report definitions, the monthly report pack, and dashboard exports. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Reporting Analyst, approved by the Service Delivery Manager.`},proc_improvement:{title:"Continual Improvement \u2014 Full Pack",clause:"10.2",content:`# Continual Improvement
_ISO/IEC 20000-1:2018 \u2014 Clause 10.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to provide a repeatable way to identify and deliver improvements to services and the SMS. This process operates across ServiceNow supporting approximately 9,200 users at 14 sites (24x7x365), is defined, measured and continually improved, and supports the contractual service levels and ISO/IEC 20000-1 certification.

## Procedure
1. Capture improvement opportunities from audits, SLA misses, feedback and reviews.
2. Log them in the improvement register with owner and expected benefit.
3. Prioritise by value and effort.
4. Plan and assign actions with target dates.
5. Implement and measure the result against a baseline.
6. Review at management review and close with evidence.

## Workflow
Capture opportunity \u2192 log & prioritise \u2192 plan \u2192 implement \u2192 measure benefit \u2192 review & close.

## RACI Matrix
| Activity | Improvement Lead | Analyst / Technician | Service Delivery Manager | Program Manager |
|---|---|---|---|---|
| Capture opportunities | R | R | A | I |
| Maintain the register | A | R | C | I |
| Prioritise & plan | A | C | R | C |
| Implement improvements | R | R | A | I |
| Measure & review benefit | A | C | R | C |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Improvement Lead** \u2014 owns and runs Continual Improvement; accountable for its outcomes and reporting.
- **Analyst / Technician** \u2014 performs the day-to-day work and records it in ServiceNow.
- **Service Delivery Manager** \u2014 accountable for performance against the service levels.
- **Program Manager** \u2014 owns the U.S. Department of Commerce relationship and approves investment.

## Inputs & Outputs
**Inputs:** audit findings, SLA misses, feedback, review outputs.
**Outputs:** improvement register, delivered improvements, benefit data.

## KPIs & Targets
| KPI | Target |
|---|---|
| Improvements delivered per quarter | \u2265 target |
| Register aging | No item stale > 90 days |
| Measured benefit | Tracked per item |

## Risks & Controls
| Risk | Control |
|---|---|
| Ideas captured but not delivered | Owned register and review cadence |
| No measurable benefit | Baseline and post-implementation review |

## Required Records
The improvement register, action plans, and benefit measurements. Records are retained per the Records Management Procedure (clause 7.5).

## Review
Reviewed at least annually and on significant change. Revision 1.0 \u2014 prepared by the Improvement Lead, approved by the Service Delivery Manager.`}},audit:{4:{"Audit Checklist":`## Internal Audit Checklist \u2014 Clause 4 (Context of the organization)

_ISO/IEC 27001:2022 \u2014 Clause 5.2 \xB7 Meridian Federal Solutions_

## 1. Purpose
This policy states Meridian Federal Solutions, LLC's commitment to protecting the confidentiality, integrity and availability of information involved in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce, under an ISMS conforming to ISO/IEC 27001:2022.

## 2. Scope
Applies to all information, systems (ServiceNow), personnel and sites (14) within the ISMS scope supporting approximately 9,200 users.

## 3. Policy Statements
- We protect information based on assessed risk and classification.
- We grant access on least-privilege and need-to-know principles.
- We meet legal, regulatory and contractual security obligations.
- We detect, respond to and learn from security incidents.
- We continually improve the ISMS and maintain ISO/IEC 27001 certification.

## 4. Authority & Approval
Issued by top management; communicated to all personnel; reviewed at least annually.

| Version | Date | Author | Approved by |
|---|---|---|---|
| 1.0 | (current) | ISMS / Security Manager | Program Manager |`},ismsscope:{title:"ISMS Scope",clause:"4.3",content:`# Scope of the ISMS
_ISO/IEC 27001:2022 \u2014 Clause 4.3 \xB7 Meridian Federal Solutions_

**Organization:** Meridian Federal Solutions, LLC
**Customer / driver:** U.S. Department of Commerce \u2014 Enterprise IT Service Desk (EITSD) contract
**Systems:** ServiceNow and supporting infrastructure

## In scope
Information, systems, people and processes used to deliver the Enterprise IT Service Desk (EITSD) contract, supporting ~9,200 users across 14 sites.

## Interfaces & dependencies
Customer-provided network and hosting are dependencies at the boundary; cloud services are governed through Supplier & Cloud Security.

## Exclusions
Exclusions (if any) are justified in the Statement of Applicability by the risk assessment.

## Governing standard
ISO/IEC 27001:2022, clauses 4\u201310 and Annex A.`},context:{title:"Context of the Organization",clause:"4.1",content:`# Context of the Organization

_ISO/IEC 27001:2022 \u2014 Clause 6.1.2 \xB7 Meridian Federal Solutions_

## Method
1. Identify information assets and their owners.
2. Identify threats and vulnerabilities for each asset.
3. Assess likelihood and impact on a defined scale (1\u20135).
4. Calculate risk = likelihood \xD7 impact; compare to the risk acceptance criteria.
5. Select treatment: mitigate (apply Annex A controls), transfer, avoid, or accept.
6. Record residual risk and obtain risk owner acceptance.

## Risk acceptance criteria
Risks scoring above the agreed threshold require treatment; residual risks are accepted by the risk owner and recorded.

## Review
The assessment is reviewed at least annually and on significant change.`},riskreport:{title:"Risk Assessment Report",clause:"6.1.2",content:`# Risk Assessment Report

## Procedure

2. Assign impartial auditors who do not audit their own work.
3. Conduct audits against ISO/IEC 27001:2022 and this ISMS.
4. Record conformities and nonconformities with objective evidence.
5. Raise corrective actions and track them to closure.
6. Report results to management review.

| Output | Audit report + corrective actions |

_ISO/IEC 27001:2022 \u2014 Clauses 10.1 & 10.2 \xB7 Meridian Federal Solutions_

## Procedure
1. Identify and record the nonconformity (from audits, incidents, or reviews).
2. Contain and correct the immediate issue.
3. Analyse the root cause.
4. Implement corrective action to prevent recurrence.
5. Verify effectiveness and close.
6. Feed improvement opportunities into the ISMS.

| Field | Example |
|---|---|
| Source | Internal audit, incident, KPI miss |
| Correction | Immediate fix |
| Corrective action | Root-cause removal |
| Verification | Effectiveness confirmed |

The ISMS is continually improved; nonconformities and actions are retained as documented information.`},soa:{title:"Statement of Applicability (SoA)",clause:"6.1.3 d)",content:`# Statement of Applicability
_ISO/IEC 27001:2022 \u2014 Clause 6.1.3 d) \xB7 Meridian Federal Solutions_

The Statement of Applicability lists the Annex A controls, whether each is applicable to the ISMS for the Enterprise IT Service Desk (EITSD) contract, and how it is implemented. Exclusions are justified by the risk assessment.

### Theme 5 Organizational

| Control | Title | Applicability | Implementation |
|---|---|---|---|
| A.5.1 | Policies for information security | Applicable | Information Security Policy set approved by management, communicated, reviewed annually |
| A.5.2 | Information security roles and responsibilities | Applicable | Roles defined in the Leadership & Roles document with named owners |
| A.5.3 | Segregation of duties | Applicable | Conflicting duties separated; request/approve/administer split across roles |
| A.5.4 | Management responsibilities | Applicable | Management requires all personnel to apply security per policy |
| A.5.5 | Contact with authorities | Applicable | Defined contacts with relevant authorities and regulators |
| A.5.6 | Contact with special interest groups | Applicable | Membership in security forums and threat-sharing groups |
| A.5.7 | Threat intelligence | Applicable | Threat feeds reviewed; findings drive risk and control updates |
| A.5.8 | Information security in project management | Applicable | Security requirements addressed in project management |
| A.5.9 | Inventory of information and associated assets | Applicable | Asset & classification register maintained with owners |
| A.5.10 | Acceptable use of information and assets | Applicable | Acceptable Use Policy accepted by all users |

### Theme 6 People

### Theme 8 Technological

_This is a representative control set; the full SoA covers all Annex A:2022 controls. Applicability is confirmed by the risk assessment and treatment plan._`},sec_access:{title:"Access Control \u2014 Control Pack",clause:"A.5.15\u20135.18, A.8.2\u20138.5",content:`# Access Control
_ISO/IEC 27001:2022 \u2014 A.5.15\u20135.18, A.8.2\u20138.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to grant, review and revoke access on least-privilege and need-to-know principles, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Provision access via role-based access control (RBAC) on joiner.
2. Require MFA for remote and privileged access.
3. Enforce least privilege; separate duties for sensitive functions.
4. Review access rights at least quarterly and on role change.
5. Revoke access immediately on leaver or role removal.
6. Log and monitor privileged access.

## Key Controls
| Control | Standard |
|---|---|
| Least privilege / RBAC | Roles mapped to job function |
| MFA | Remote + privileged access |
| Access review | Quarterly + on change |
| Joiner/mover/leaver | Tied to HR process |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Access requests, quarterly access reviews, and privileged-access logs. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_crypto:{title:"Cryptography & Key Management \u2014 Control Pack",clause:"A.8.24",content:`# Cryptography & Key Management
_ISO/IEC 27001:2022 \u2014 A.8.24 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to protect information in transit and at rest with appropriate cryptography and managed keys, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Encrypt data in transit (TLS 1.2+) and at rest (AES-256).
2. Define approved algorithms and key lengths.
3. Manage keys through their lifecycle: generate, store, rotate, revoke.
4. Protect keys with access control and, where required, an HSM/KMS.
5. Rotate keys on schedule and on compromise.
6. Record cryptographic controls in the asset register.

## Key Controls
| Control | Standard |
|---|---|
| In transit | TLS 1.2+ |
| At rest | AES-256 |
| Key storage | KMS/HSM, access-controlled |
| Rotation | Scheduled + on compromise |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
The cryptographic controls register and key-rotation logs. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_incident:{title:"Information Security Incident Management \u2014 Control Pack",clause:"A.5.24\u20135.28",content:`# Information Security Incident Management
_ISO/IEC 27001:2022 \u2014 A.5.24\u20135.28 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to detect, respond to, and learn from information security incidents and breaches, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Provide a channel to report security events.
2. Triage and classify events; declare incidents by severity.
3. Contain, eradicate and recover per the response plan.
4. Notify the customer and regulators within contractual/legal timeframes.
5. Preserve evidence and conduct post-incident review.
6. Feed lessons into risk and control improvements.

## Key Controls
| Control | Standard |
|---|---|
| Reporting channel | Available to all staff |
| Severity classification | Defined matrix |
| Breach notification | Per contract/law timeframes |
| Post-incident review | For all major incidents |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Security incident records, breach notifications, and post-incident reviews. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_supplier:{title:"Supplier & Cloud Security \u2014 Control Pack",clause:"A.5.19\u20135.23",content:`# Supplier & Cloud Security
_ISO/IEC 27001:2022 \u2014 A.5.19\u20135.23 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure suppliers and cloud services meet the organization's security requirements, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Assess supplier/cloud security before engagement.
2. Include security requirements and right-to-audit in contracts.
3. Review provider assurance (e.g. SOC 2, ISO 27001, FedRAMP).
4. Monitor supplier security performance.
5. Manage changes and offboarding securely.
6. Maintain a register of suppliers and their assurance status.

## Key Controls
| Control | Standard |
|---|---|
| Pre-engagement assessment | Required |
| Contract security clauses | Standard |
| Provider assurance | Reviewed periodically |
| Offboarding | Access and data removal |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
The supplier security register and assurance reviews. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_logging:{title:"Logging & Monitoring \u2014 Control Pack",clause:"A.8.15\u20138.16",content:`# Logging & Monitoring
_ISO/IEC 27001:2022 \u2014 A.8.15\u20138.16 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to record security-relevant events and detect anomalies in a timely way, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Log authentication, access, and administrative events centrally.
2. Protect logs from tampering; retain per policy.
3. Define alerting rules for anomalies and threats.
4. Review alerts and investigate as needed.
5. Correlate events for detection (SIEM where available).
6. Report monitoring outcomes to management.

## Key Controls
| Control | Standard |
|---|---|
| Central logging | Security-relevant events |
| Log protection | Tamper-resistant, retained |
| Alerting | Anomaly + threat rules |
| Review | Defined cadence |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Log configuration, alert definitions, and monitoring reports. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_vuln:{title:"Vulnerability & Patch Management \u2014 Control Pack",clause:"A.8.8",content:`# Vulnerability & Patch Management
_ISO/IEC 27001:2022 \u2014 A.8.8 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and remediate technical vulnerabilities before they can be exploited, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Scan systems for vulnerabilities on a schedule.
2. Rate findings by severity (e.g. CVSS).
3. Remediate within severity-based SLAs.
4. Patch systems on a defined cadence and for emergencies.
5. Verify remediation and track exceptions.
6. Report vulnerability posture to management.

## Key Controls
| Control | Standard |
|---|---|
| Scanning | Scheduled |
| Severity SLAs | Critical fastest |
| Patch cadence | Routine + emergency |
| Exceptions | Tracked with risk acceptance |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Scan results, remediation tracking, and patch records. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_continuity:{title:"Business Continuity & Backup \u2014 Control Pack",clause:"A.5.29\u20135.30, A.8.13\u20138.14",content:`# Business Continuity & Backup
_ISO/IEC 27001:2022 \u2014 A.5.29\u20135.30, A.8.13\u20138.14 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to maintain and recover information security during and after disruption, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Identify critical services and set RTO/RPO.
2. Back up data on schedule and protect backups.
3. Document continuity and recovery plans.
4. Test recovery from backup at least annually.
5. Include security requirements in continuity plans.
6. Review and update after tests and major change.

## Key Controls
| Control | Standard |
|---|---|
| Backup schedule | Defined; protected copies |
| Restore testing | At least annual |
| RTO/RPO | Agreed with customer |
| Plan review | Post-test + on change |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Backup logs, restore-test results, and continuity plans. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},sec_hr:{title:"Human Resource Security \u2014 Control Pack",clause:"A.6.1\u20136.8",content:`# Human Resource Security
_ISO/IEC 27001:2022 \u2014 A.6.1\u20136.8 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure personnel are suitable for, aware of, and accountable to their security responsibilities, in support of securely delivering the Enterprise IT Service Desk (EITSD) contract and maintaining ISO/IEC 27001 certification.

## Procedure
1. Screen personnel before granting access, per contract.
2. State security responsibilities in employment terms.
3. Deliver security awareness training at onboarding and annually.
4. Apply the disciplinary process for violations.
5. Manage secure remote working.
6. Remove access and return assets on exit.

## Key Controls
| Control | Standard |
|---|---|
| Screening | Pre-access |
| Awareness | Onboarding + annual |
| Disciplinary | Documented |
| Leaver process | Access + asset return |

## Roles & Responsibilities
- **HR + Security Lead** \u2014 owns this control area and its effectiveness.
- **Asset/System Owners** \u2014 implement controls for their systems.
- **All personnel** \u2014 comply and report security events.

## Required Records
Screening records, training records, and leaver checklists. Records are retained per the Documented Information Control procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`}},audit:{4:{"Audit Checklist":`## ISMS Internal Audit Checklist \u2014 Clause 4 (Context of the organization)

## Purpose
Meridian Federal Solutions, LLC protects Controlled Unclassified Information (CUI) handled in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce, meeting NIST SP 800-171 and CMMC Level 2 requirements.

_NIST SP 800-171 \xB7 3.1 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to limit system access to authorized users and processes, on least privilege, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Access Control controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.1.1 | Limit system access to authorized users, processes, and devices | Access is limited to authorized users, processes, and devices through Microsoft Entra ID with role-based access control (RBAC); accounts are provisioned via an approval workflow. |
| 3.1.2 | Limit access to permitted transactions and functions | Users are restricted to permitted transactions and functions via RBAC roles scoped to job duties in Microsoft Entra ID and ServiceNow. |
| 3.1.3 | Control the flow of CUI per approved authorizations | CUI flow is controlled by network segmentation, DLP policy, and approved connection rules documented in the boundary diagram. |
| 3.1.4 | Separate duties to reduce risk of malevolent activity | Separation of duties is enforced so request, approval, and administration of access are performed by different roles. |
| 3.1.5 | Employ least privilege, including for privileged accounts | Least privilege is enforced; privileged access is limited to named administrators and reviewed quarterly. |
| 3.1.6 | Use non-privileged accounts for nonsecurity functions | Administrators use separate non-privileged accounts for routine, non-security functions. |
| 3.1.7 | Prevent non-privileged users from executing privileged functions; log them | Non-privileged users are prevented from executing privileged functions; such attempts are captured in Microsoft Sentinel (SIEM). |
| 3.1.8 | Limit unsuccessful logon attempts | Accounts lock after 5 failed logon attempts for a defined lockout period. |
| 3.1.9 | Provide privacy and security notices consistent with CUI rules | A system-use / privacy banner consistent with CUI rules is displayed at logon. |
| 3.1.10 | Use session lock with pattern-hiding displays after inactivity | Session lock with a pattern-hiding display engages after 15 minutes of inactivity, enforced via Microsoft Intune. |
| 3.1.11 | Terminate a user session after a defined condition | User sessions terminate automatically after 30 minutes of inactivity or at defined conditions. |
| 3.1.12 | Monitor and control remote access sessions | Remote access sessions are monitored and controlled through the managed VPN and logged to Microsoft Sentinel (SIEM). |
| 3.1.13 | Use cryptographic mechanisms to protect remote access sessions | Remote access is protected with FIPS 140-2 validated AES-256 over TLS 1.2 or higher. |
| 3.1.14 | Route remote access via managed access control points | Remote access is routed through a limited number of managed access control points (VPN concentrators). |
| 3.1.15 | Authorize remote execution of privileged commands | Remote execution of privileged commands and access to security-relevant information require explicit authorization and MFA. |
| 3.1.16 | Authorize wireless access prior to connection | Wireless access is authorized before connection and restricted to approved SSIDs. |
| 3.1.17 | Protect wireless access using authentication and encryption | Wireless access is protected with WPA2/WPA3-Enterprise authentication and encryption. |
| 3.1.18 | Control connection of mobile devices | Mobile device connections are controlled and enrolled in Microsoft Intune. |
| 3.1.19 | Encrypt CUI on mobile devices and platforms | CUI on mobile devices is encrypted using FIPS 140-2 validated AES-256 device encryption. |
| 3.1.20 | Verify and control connections to external systems | Connections to external systems are verified and limited by policy and technical controls; unmanaged devices are denied. |
| 3.1.21 | Limit use of portable storage devices on external systems | Use of portable storage on external systems is prohibited by policy and endpoint controls. |
| 3.1.22 | Control CUI posted on publicly accessible systems | CUI is prohibited from publicly accessible systems; public content is reviewed before posting. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for Access Control, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_at:{title:"Awareness & Training (3.2)",clause:"3.2",content:`# Awareness & Training

## Policy
It is Meridian Federal Solutions's policy to create and protect audit logs to enable monitoring and investigation, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

| Practice | Requirement | Implementation |
|---|---|---|
| 3.3.1 | Create and retain system audit logs and records | Audit logs are generated and retained at least one year in Microsoft Sentinel (SIEM) to support monitoring and investigation. |
| 3.3.2 | Ensure actions are uniquely traceable to individual users | Actions are uniquely traceable to individual users through unique IDs; shared accounts are prohibited. |
| 3.3.3 | Review and update logged events | Logged event types are reviewed and updated quarterly. |
| 3.3.4 | Alert on audit logging process failure | Alerts are generated on audit logging process failure. |
| 3.3.5 | Correlate audit review for investigation and response | Audit records are correlated and reviewed in Microsoft Sentinel (SIEM) for investigation and response. |
| 3.3.6 | Provide audit reduction and report generation | Audit reduction and on-demand reporting are provided by Microsoft Sentinel (SIEM). |
| 3.3.7 | Synchronize internal clocks with an authoritative source | System clocks are synchronized to an authoritative time source (NIST NTP) for accurate time stamps. |
| 3.3.8 | Protect audit information and tools from tampering | Audit information and logging tools are protected from unauthorized access and modification via access controls. |
| 3.3.9 | Limit management of audit logging to privileged users | Management of audit logging is limited to a defined subset of privileged users. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

| 3.4.2 | Establish and enforce security configuration settings | Security configuration settings are enforced against CIS / DISA STIG baselines. |
| 3.4.3 | Track, review, approve, and log changes | Changes are tracked, reviewed, approved, and logged through the change-management process. |
| 3.4.4 | Analyze security impact of changes before implementation | Security impact of changes is analyzed before implementation. |
| 3.4.5 | Define and enforce access restrictions for changes | Physical and logical access restrictions for changes are defined and enforced. |
| 3.4.6 | Employ least functionality | Least functionality is enforced; only essential capabilities are enabled. |

| 3.4.9 | Control and monitor user-installed software | User-installed software is controlled and monitored via Microsoft Intune. |

_NIST SP 800-171 \xB7 3.5 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and authenticate users and devices before access, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Identification & Authentication controls to all in-scope systems (ServiceNow and CUI assets).

_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.5.1 | Identify users, processes, and devices | Users, processes, and devices are uniquely identified in Microsoft Entra ID. |
| 3.5.2 | Authenticate identities before access | Identities are authenticated before access is granted. |
| 3.5.3 | Use multifactor authentication for privileged and network access | MFA is required for privileged and network access using an authenticator app / FIDO2 security keys. |
| 3.5.4 | Employ replay-resistant authentication | Replay-resistant authentication is employed (e.g., Kerberos, FIDO2). |
| 3.5.5 | Prevent reuse of identifiers for a defined period | Identifier reuse is prevented for a defined period. |
| 3.5.6 | Disable identifiers after inactivity | Identifiers are disabled after 35 days of inactivity. |
| 3.5.7 | Enforce minimum password complexity | Password complexity requires a minimum of 14 characters. |
| 3.5.8 | Prohibit password reuse for a number of generations | Password reuse is prohibited for 24 generations. |
| 3.5.9 | Allow temporary passwords with immediate change | Temporary passwords require immediate change to a permanent password. |
| 3.5.10 | Store and transmit only cryptographically-protected passwords | Passwords are stored and transmitted only in cryptographically-protected form. |
| 3.5.11 | Obscure feedback of authentication information | Authentication feedback is obscured (masked entry). |

- **Security Lead** \u2014 accountable for this family's implementation and assessment.

- **All personnel** \u2014 comply and report issues.

| 3.10.2 | Protect and monitor the physical facility | Facilities and support infrastructure are protected and monitored (CCTV, alarms). |

_NIST SP 800-171 \xB7 3.13 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor and protect communications and system boundaries, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the System & Communications Protection controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.13.1 | Monitor, control, and protect communications at boundaries | Communications at external and key internal boundaries are monitored and protected via firewalls and Microsoft Sentinel (SIEM). |
| 3.13.2 | Employ secure architecture and engineering principles | Secure architecture and engineering principles are applied to system design. |
| 3.13.3 | Separate user functionality from system management | User functionality is separated from system management functionality. |
| 3.13.4 | Prevent unauthorized transfer via shared resources | Unauthorized information transfer via shared resources is prevented. |
| 3.13.5 | Implement subnetworks for publicly accessible components | Publicly accessible components are placed in a separated subnet (DMZ). |
| 3.13.6 | Deny network traffic by default, permit by exception | Network traffic is denied by default and permitted by exception (deny-all firewall posture). |
| 3.13.7 | Prevent split tunneling on remote devices | Split tunneling is prevented on remote devices. |
| 3.13.8 | Use cryptography to protect CUI in transmission | CUI in transmission is protected with FIPS 140-2 validated AES-256 over TLS 1.2 or higher. |
| 3.13.9 | Terminate network connections after inactivity | Network connections terminate after 30 minutes of inactivity or at session end. |
| 3.13.10 | Establish and manage cryptographic keys | Cryptographic keys are established and managed per a key-management procedure. |
| 3.13.11 | Employ FIPS-validated cryptography to protect CUI | FIPS 140-2 validated AES-256 (FIPS-validated) is employed to protect the confidentiality of CUI. |
| 3.13.12 | Prohibit remote activation of collaborative devices | Remote activation of collaborative computing devices is prohibited; in-use indication is provided. |
| 3.13.13 | Control and monitor use of mobile code | Mobile code is controlled and monitored. |
| 3.13.14 | Control and monitor use of VoIP | VoIP use is controlled and monitored. |
| 3.13.15 | Protect authenticity of communications sessions | Communications session authenticity is protected (TLS, signed sessions). |
| 3.13.16 | Protect the confidentiality of CUI at rest | CUI at rest is protected with FIPS 140-2 validated AES-256 encryption. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for System & Communications Protection, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_si:{title:"System & Information Integrity (3.14)",clause:"3.14",content:`# System & Information Integrity
_NIST SP 800-171 \xB7 3.14 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and correct flaws and protect against malicious code, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the System & Information Integrity controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.14.1 | Identify, report, and correct system flaws timely | System flaws are identified and remediated timely: critical within 30 days. |
| 3.14.2 | Provide protection from malicious code | Malicious code protection (Microsoft Defender for Endpoint (EDR)) is deployed at designated locations. |
| 3.14.3 | Monitor security alerts and advisories and act | Security alerts and advisories are monitored and acted upon. |
| 3.14.4 | Update malicious code protection mechanisms | Malicious code protection mechanisms are updated automatically. |

| 3.14.6 | Monitor systems and traffic to detect attacks | Systems and inbound/outbound traffic are monitored to detect attacks via Microsoft Sentinel (SIEM) / Microsoft Defender for Endpoint (EDR). |
| 3.14.7 | Identify unauthorized use of systems | Unauthorized use of systems is identified through monitoring and alerting. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

_ISO 9001:2015 \u2014 Clause 8.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to determine, review and communicate requirements for the services before commitment, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Capture requirements from the contract and customer.
2. Review requirements for feasibility before committing (8.2.3).
3. Resolve differences between stated and contracted requirements.
4. Communicate with the customer on enquiries, changes and feedback.
5. Record requirement reviews and changes.
6. Handle customer property and feedback appropriately.

## Workflow
Requirement \u2192 review feasibility \u2192 commit \u2192 deliver \u2192 feedback \u2192 change control.

## Key Controls
| Control | Standard |
|---|---|
