_NIST SP 800-171 \xB7 3.1 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to limit system access to authorized users and processes, on least privilege, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Access Control controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.1.1 | Limit system access to authorized users, processes, and devices | Access is limited to authorized users, processes, and devices through Microsoft Entra ID with role-based access control (RBAC); accounts are provisioned via an approval workflow. |
| 3.1.2 | Limit access to permitted transactions and functions | Users are restricted to permitted transactions and functions via RBAC roles scoped to job duties in Microsoft Entra ID and ServiceNow. |
| 3.1.3 | Control the flow of CUI per approved authorizations | CUI flow is controlled by network segmentation, DLP policy, and approved connection rules documented in the boundary diagram. |
| 3.1.4 | Separate duties to reduce risk of malevolent activity | Separation of duties is enforced so request, approval, and administration of access are performed by different roles. |
| 3.1.5 | Employ least privilege, including for privileged accounts | Least privilege is enforced; privileged access is limited to named administrators and reviewed quarterly. |
| 3.1.6 | Use non-privileged accounts for nonsecurity functions | Administrators use separate non-privileged accounts for routine, non-security functions. |
| 3.1.7 | Prevent non-privileged users from executing privileged functions; log them | Non-privileged users are prevented from executing privileged functions; such attempts are captured in Microsoft Sentinel (SIEM). |
| 3.1.8 | Limit unsuccessful logon attempts | Accounts lock after 5 failed logon attempts for a defined lockout period. |
| 3.1.9 | Provide privacy and security notices consistent with CUI rules | A system-use / privacy banner consistent with CUI rules is displayed at logon. |
| 3.1.10 | Use session lock with pattern-hiding displays after inactivity | Session lock with a pattern-hiding display engages after 15 minutes of inactivity, enforced via Microsoft Intune. |
| 3.1.11 | Terminate a user session after a defined condition | User sessions terminate automatically after 30 minutes of inactivity or at defined conditions. |
| 3.1.12 | Monitor and control remote access sessions | Remote access sessions are monitored and controlled through the managed VPN and logged to Microsoft Sentinel (SIEM). |
| 3.1.13 | Use cryptographic mechanisms to protect remote access sessions | Remote access is protected with FIPS 140-2 validated AES-256 over TLS 1.2 or higher. |
| 3.1.14 | Route remote access via managed access control points | Remote access is routed through a limited number of managed access control points (VPN concentrators). |
| 3.1.15 | Authorize remote execution of privileged commands | Remote execution of privileged commands and access to security-relevant information require explicit authorization and MFA. |
| 3.1.16 | Authorize wireless access prior to connection | Wireless access is authorized before connection and restricted to approved SSIDs. |
| 3.1.17 | Protect wireless access using authentication and encryption | Wireless access is protected with WPA2/WPA3-Enterprise authentication and encryption. |
| 3.1.18 | Control connection of mobile devices | Mobile device connections are controlled and enrolled in Microsoft Intune. |
| 3.1.19 | Encrypt CUI on mobile devices and platforms | CUI on mobile devices is encrypted using FIPS 140-2 validated AES-256 device encryption. |
| 3.1.20 | Verify and control connections to external systems | Connections to external systems are verified and limited by policy and technical controls; unmanaged devices are denied. |
| 3.1.21 | Limit use of portable storage devices on external systems | Use of portable storage on external systems is prohibited by policy and endpoint controls. |
| 3.1.22 | Control CUI posted on publicly accessible systems | CUI is prohibited from publicly accessible systems; public content is reviewed before posting. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for Access Control, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_at:{title:"Awareness & Training (3.2)",clause:"3.2",content:`# Awareness & Training
_NIST SP 800-171 \xB7 3.2 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to make personnel aware of security risks and their responsibilities, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Awareness & Training controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.2.1 | Make users aware of security risks of their activities | All users complete security awareness training at onboarding and annually, covering the risks of their activities. |
| 3.2.2 | Train personnel for assigned security duties | Personnel with security duties receive role-based training appropriate to their responsibilities. |
| 3.2.3 | Provide insider-threat awareness training | Awareness training includes recognizing and reporting insider-threat indicators. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for Awareness & Training, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_au:{title:"Audit & Accountability (3.3)",clause:"3.3",content:`# Audit & Accountability
_NIST SP 800-171 \xB7 3.3 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to create and protect audit logs to enable monitoring and investigation, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Audit & Accountability controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.3.1 | Create and retain system audit logs and records | Audit logs are generated and retained at least one year in Microsoft Sentinel (SIEM) to support monitoring and investigation. |
| 3.3.2 | Ensure actions are uniquely traceable to individual users | Actions are uniquely traceable to individual users through unique IDs; shared accounts are prohibited. |
| 3.3.3 | Review and update logged events | Logged event types are reviewed and updated quarterly. |
| 3.3.4 | Alert on audit logging process failure | Alerts are generated on audit logging process failure. |
| 3.3.5 | Correlate audit review for investigation and response | Audit records are correlated and reviewed in Microsoft Sentinel (SIEM) for investigation and response. |
| 3.3.6 | Provide audit reduction and report generation | Audit reduction and on-demand reporting are provided by Microsoft Sentinel (SIEM). |
| 3.3.7 | Synchronize internal clocks with an authoritative source | System clocks are synchronized to an authoritative time source (NIST NTP) for accurate time stamps. |
| 3.3.8 | Protect audit information and tools from tampering | Audit information and logging tools are protected from unauthorized access and modification via access controls. |
| 3.3.9 | Limit management of audit logging to privileged users | Management of audit logging is limited to a defined subset of privileged users. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for Audit & Accountability, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_cm:{title:"Configuration Management (3.4)",clause:"3.4",content:`# Configuration Management
_NIST SP 800-171 \xB7 3.4 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to establish and maintain secure baseline configurations, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Configuration Management controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.4.1 | Establish and maintain baseline configurations and inventories | Baseline configurations and asset inventories are established and maintained in Microsoft Intune / CMDB. |
| 3.4.2 | Establish and enforce security configuration settings | Security configuration settings are enforced against CIS / DISA STIG baselines. |
| 3.4.3 | Track, review, approve, and log changes | Changes are tracked, reviewed, approved, and logged through the change-management process. |
| 3.4.4 | Analyze security impact of changes before implementation | Security impact of changes is analyzed before implementation. |
| 3.4.5 | Define and enforce access restrictions for changes | Physical and logical access restrictions for changes are defined and enforced. |
| 3.4.6 | Employ least functionality | Least functionality is enforced; only essential capabilities are enabled. |
| 3.4.7 | Restrict nonessential programs, ports, protocols, services | Nonessential programs, ports, protocols, and services are restricted or disabled. |
| 3.4.8 | Apply deny-by-exception / permit-by-exception for software | Application allow-listing (permit-by-exception) controls software execution. |
| 3.4.9 | Control and monitor user-installed software | User-installed software is controlled and monitored via Microsoft Intune. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for Configuration Management, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_ia:{title:"Identification & Authentication (3.5)",clause:"3.5",content:`# Identification & Authentication
_NIST SP 800-171 \xB7 3.5 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and authenticate users and devices before access, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the Identification & Authentication controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.5.1 | Identify users, processes, and devices | Users, processes, and devices are uniquely identified in Microsoft Entra ID. |
| 3.5.2 | Authenticate identities before access | Identities are authenticated before access is granted. |
| 3.5.3 | Use multifactor authentication for privileged and network access | MFA is required for privileged and network access using an authenticator app / FIDO2 security keys. |
| 3.5.4 | Employ replay-resistant authentication | Replay-resistant authentication is employed (e.g., Kerberos, FIDO2). |
| 3.5.5 | Prevent reuse of identifiers for a defined period | Identifier reuse is prevented for a defined period. |
| 3.5.6 | Disable identifiers after inactivity | Identifiers are disabled after 35 days of inactivity. |
| 3.5.7 | Enforce minimum password complexity | Password complexity requires a minimum of 14 characters. |
| 3.5.8 | Prohibit password reuse for a number of generations | Password reuse is prohibited for 24 generations. |
| 3.5.9 | Allow temporary passwords with immediate change | Temporary passwords require immediate change to a permanent password. |
| 3.5.10 | Store and transmit only cryptographically-protected passwords | Passwords are stored and transmitted only in cryptographically-protected form. |
| 3.5.11 | Obscure feedback of authentication information | Authentication feedback is obscured (masked entry). |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.

_NIST SP 800-171 \xB7 3.13 \xB7 CMMC Level 2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor and protect communications and system boundaries, protecting Controlled Unclassified Information (CUI) processed in support of the Enterprise IT Service Desk (EITSD) contract.

## Procedure
1. Apply the System & Communications Protection controls to all in-scope systems (ServiceNow and CUI assets).
2. Assign responsibility to the System Owner and Security Lead.
3. Operate and monitor the controls day to day.
4. Record evidence of implementation and effectiveness.
5. Remediate gaps via the Plan of Action & Milestones (POA&M).
6. Review at least annually and on significant change.

## Implementation of practices (NIST SP 800-171)
_The implementation column reflects the organization's configuration; confirm each value against your environment._

| Practice | Requirement | Implementation |
|---|---|---|
| 3.13.1 | Monitor, control, and protect communications at boundaries | Communications at external and key internal boundaries are monitored and protected via firewalls and Microsoft Sentinel (SIEM). |
| 3.13.2 | Employ secure architecture and engineering principles | Secure architecture and engineering principles are applied to system design. |
| 3.13.3 | Separate user functionality from system management | User functionality is separated from system management functionality. |
| 3.13.4 | Prevent unauthorized transfer via shared resources | Unauthorized information transfer via shared resources is prevented. |
| 3.13.5 | Implement subnetworks for publicly accessible components | Publicly accessible components are placed in a separated subnet (DMZ). |
| 3.13.6 | Deny network traffic by default, permit by exception | Network traffic is denied by default and permitted by exception (deny-all firewall posture). |
| 3.13.7 | Prevent split tunneling on remote devices | Split tunneling is prevented on remote devices. |
| 3.13.8 | Use cryptography to protect CUI in transmission | CUI in transmission is protected with FIPS 140-2 validated AES-256 over TLS 1.2 or higher. |
| 3.13.9 | Terminate network connections after inactivity | Network connections terminate after 30 minutes of inactivity or at session end. |
| 3.13.10 | Establish and manage cryptographic keys | Cryptographic keys are established and managed per a key-management procedure. |
| 3.13.11 | Employ FIPS-validated cryptography to protect CUI | FIPS 140-2 validated AES-256 (FIPS-validated) is employed to protect the confidentiality of CUI. |
| 3.13.12 | Prohibit remote activation of collaborative devices | Remote activation of collaborative computing devices is prohibited; in-use indication is provided. |
| 3.13.13 | Control and monitor use of mobile code | Mobile code is controlled and monitored. |
| 3.13.14 | Control and monitor use of VoIP | VoIP use is controlled and monitored. |
| 3.13.15 | Protect authenticity of communications sessions | Communications session authenticity is protected (TLS, signed sessions). |
| 3.13.16 | Protect the confidentiality of CUI at rest | CUI at rest is protected with FIPS 140-2 validated AES-256 encryption. |

## Roles & Responsibilities
- **Security Lead** \u2014 accountable for this family's implementation and assessment.
- **System Owners** \u2014 implement and operate the controls on their systems.
- **All personnel** \u2014 comply and report issues.

## Required Records
Implementation evidence, monitoring output, and POA&M entries for System & Communications Protection, retained per policy.

## Review
Assessed at least annually and on significant change. Revision 1.0.`},fam_si:{title:"System & Information Integrity (3.14)",clause:"3.14",content:`# System & Information Integrity

_ISO 9001:2015 \u2014 Clause 5.2 \xB7 Meridian Federal Solutions_

## Purpose
Meridian Federal Solutions, LLC is committed to consistently delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce in a way that meets requirements and enhances customer satisfaction, under a QMS conforming to ISO 9001:2015.

## Policy statements
- Meet customer, statutory and regulatory requirements.
- Set and review measurable quality objectives.
- Apply the process approach and risk-based thinking.
- Continually improve the QMS.

| Version | Date | Author | Approved by |
|---|---|---|---|
| 1.0 | (current) | Quality Manager | Program Manager |`},qmsscope:{title:"QMS Scope",clause:"4.3",content:`# Scope of the QMS
_ISO 9001:2015 \u2014 Clause 4.3 \xB7 Meridian Federal Solutions_

**Organization:** Meridian Federal Solutions, LLC \xB7 **Customer:** U.S. Department of Commerce \xB7 **Services:** delivery of the Enterprise IT Service Desk (EITSD) contract (~9,200 users, 14 sites, on ServiceNow).

The QMS covers planning, delivery, control and improvement of the contracted services. Clause 8.3 (Design & Development) applies only where the organization designs services; otherwise justified as not applicable. Governing standard: ISO 9001:2015, clauses 4\u201310.`},context:{title:"Context & Interested Parties",clause:"4.1 / 4.2",content:`# Context & Interested Parties
_ISO 9001:2015 \u2014 Clauses 4.1 & 4.2 \xB7 Meridian Federal Solutions_

## Interested parties

| U.S. Department of Commerce | Conforming services; satisfaction |

| Regulators | Compliance |`},leadership:{title:"Leadership & Customer Focus",clause:"5.1",content:`# Leadership & Customer Focus

| Quality Manager | Maintains QMS; audits; improvement | Manages documents, actions |
| Process Owners | Own & improve their processes | Direct their process |`},objectives:{title:"Quality Objectives",clause:"6.2",content:`# Quality Objectives

Reviewed at management review.`},customerreq:{title:"Requirements & Customer Communication",clause:"8.2",content:`# Requirements for Services & Customer Communication
_ISO 9001:2015 \u2014 Clause 8.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to determine, review and communicate requirements for the services before commitment, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Capture requirements from the contract and customer.
2. Review requirements for feasibility before committing (8.2.3).
3. Resolve differences between stated and contracted requirements.
4. Communicate with the customer on enquiries, changes and feedback.
5. Record requirement reviews and changes.
6. Handle customer property and feedback appropriately.

## Workflow
Requirement \u2192 review feasibility \u2192 commit \u2192 deliver \u2192 feedback \u2192 change control.

## Key Controls
| Control | Standard |
|---|---|
| Requirements review | Before commitment (8.2.3) |
| Change control | Documented |
| Customer communication | Defined channels |
| Feedback capture | Continuous |

## Roles & Responsibilities
- **Service Delivery Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Requirement reviews completed | 100% |
| Customer enquiries answered on time | \u2265 95% |

## Required Records
Requirement reviews, change records, and customer communications. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},serviceprovision:{title:"Service Provision (Operation)",clause:"8.1 / 8.5",content:`# Operational Planning & Service Provision
_ISO 9001:2015 \u2014 Clauses 8.1 & 8.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to plan and control service provision so outputs consistently meet requirements, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Plan delivery, resources and controls (8.1).
2. Control service provision against defined criteria (8.5).
3. Identify and trace outputs; preserve information.
4. Control changes to service provision.
5. Release only conforming services.
6. Monitor against acceptance criteria.

## Workflow
Plan \u2192 control provision \u2192 monitor \u2192 release conforming service \u2192 change control.

## RACI Matrix
| Activity | Service Delivery Manager | Team | Manager | Executive |
|---|---|---|---|---|
| Plan delivery | A | R | C | I |
| Control service provision | A | R | C | I |
| Release conforming output | R | R | A | I |
| Control changes | A | C | R | I |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Service Delivery Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Services meeting acceptance criteria | \u2265 98% |
| Unplanned changes | Downward trend |

## Required Records
Service records, acceptance evidence, and change records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},purchasing:{title:"Control of External Providers",clause:"8.4",content:`# Control of Externally Provided Processes & Suppliers
_ISO 9001:2015 \u2014 Clause 8.4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure externally provided processes, products and services conform to requirements, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define criteria for evaluation and selection of providers.
2. Communicate requirements to providers.
3. Verify externally provided items meet requirements.
4. Monitor provider performance.
5. Re-evaluate and re-approve providers periodically.
6. Address provider nonconformities.

## Workflow
Evaluate \u2192 select \u2192 communicate requirements \u2192 verify \u2192 monitor \u2192 re-approve.

## Key Controls
| Control | Standard |
|---|---|
| Evaluation & selection | Criteria-based |
| Requirements to suppliers | Documented |
| Verification | On receipt/service |
| Performance monitoring | Periodic |

## Roles & Responsibilities
- **Quality Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Supplier conformance | \u2265 95% |
| Approved-supplier use | 100% |

## Required Records
Approved supplier list, evaluations, and verification records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},nonconformity:{title:"Control of Nonconforming Outputs",clause:"8.7",content:`# Control of Nonconforming Outputs
_ISO 9001:2015 \u2014 Clause 8.7 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to identify and control outputs that do not conform, to prevent unintended use, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Identify and segregate nonconforming output.
2. Correct, or obtain concession where appropriate.
3. Record the nonconformity and action taken.
4. Verify conformity after correction.
5. Raise corrective action where recurrence is likely.

## Workflow
Detect nonconformity \u2192 segregate \u2192 correct/concession \u2192 verify \u2192 record \u2192 corrective action.

## Key Controls
| Control | Standard |
|---|---|
| Identification | Marked & segregated |
| Disposition | Correct / concession / reject |
| Verification | Re-checked |
| Records | Retained |

## Roles & Responsibilities
- **Quality Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Escaped nonconformities | 0 |
| NCR closure on time | \u2265 90% |

## Required Records
Nonconformity records and disposition decisions. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},monitoring:{title:"Monitoring, Measurement & Customer Satisfaction",clause:"9.1",content:`# Monitoring, Measurement & Customer Satisfaction
_ISO 9001:2015 \u2014 Clause 9.1 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor performance and customer satisfaction and act on the results, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Determine what to monitor and measure.
2. Track service performance against SLAs.
3. Measure customer satisfaction (survey / feedback).
4. Analyse data for trends.
5. Report to management review.
6. Trigger improvement where targets are missed.

## Workflow
Define measures \u2192 monitor \u2192 measure satisfaction \u2192 analyse \u2192 report \u2192 improve.



## Roles & Responsibilities
- **Quality Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| SLA attainment | \u2265 95% |
| CSAT | \u2265 90% |
| Data reviewed at MR | 100% |

## Required Records
Performance data, satisfaction results, and analysis. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},competency:{title:"Competence & Awareness",clause:"7.2 / 7.3",content:`# Competence & Awareness

_ISO 9001:2015 \u2014 Clause 7.5 \xB7 Meridian Federal Solutions_

## Procedure
1. Create using approved templates.
2. Review and approve before publication.
3. Version as Major.Minor; record version, date, approver.
4. Publish to the controlled repository with access control.
5. Review at least annually and on significant change.
6. Archive superseded versions.

| Control | Rule |
|---|---|
| Naming | [Type] - [Title] - v[version] |
| Storage | Controlled, access-restricted repository |
| Change record | Version table in each document |
| Retention | Per the records procedure |`},records:{title:"Records & Retention",clause:"7.5",content:`# Records & Retention

Records are protected against loss and unauthorised change; disposed of securely at end of retention.`},internalaudit:{title:"Internal Audit Programme",clause:"9.2",content:`# Internal Audit Programme
_ISO 9001:2015 \u2014 Clause 9.2 \xB7 Meridian Federal Solutions_

## Procedure
1. Plan an annual audit programme covering all clauses/controls.
2. Assign impartial auditors (not auditing their own work).
3. Conduct audits against the standard and this system.
4. Record findings (conformities and nonconformities).
5. Raise corrective actions and track to closure.
6. Report results to management review.

| Element | Standard |
|---|---|
| Frequency | At least annual; risk-based |
| Auditor independence | Required |
| Evidence | Sampled records, interviews |
| Output | Audit report + actions |`},mgmtreview:{title:"Management Review",clause:"9.3",content:`# Management Review
_ISO 9001:2015 \u2014 Clause 9.3 \xB7 Meridian Federal Solutions_

Top management reviews the system at least quarterly. Inputs and outputs:

| Inputs | Outputs |
|---|---|
| Status of prior actions | Decisions on improvement |
| Objective & KPI performance | Resource decisions |
| Audit results & nonconformities | Changes to the system |
| Customer feedback / satisfaction | Updated objectives |
| Risks & opportunities | Action assignments |

Minutes are recorded and retained as evidence.`},improvement:{title:"Nonconformity, Corrective Action & Improvement",clause:"10.1 / 10.2",content:`# Nonconformity, Corrective Action & Improvement
_ISO 9001:2015 \u2014 Clauses 10.1 & 10.2 \xB7 Meridian Federal Solutions_

## Procedure
1. Identify and record the nonconformity.
2. Contain and correct the immediate issue.
3. Analyse the root cause.
4. Implement corrective action to prevent recurrence.
5. Verify effectiveness and close.
6. Feed improvement opportunities into the register.

| Field | Example |
|---|---|
| Source | Audit, complaint, incident, KPI miss |
| Correction | Immediate fix |
| Corrective action | Root-cause removal |
| Verification | Effectiveness confirmed |

Continual improvement is driven through the register, reviewed at management review.`}},audit:{4:{"Audit Checklist":`## Internal Audit Checklist \u2014 Clause 4 (Context)

_ISO 22301:2019 \u2014 Clause 8.3 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to select strategies and solutions that meet the recovery objectives from the BIA, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Derive requirements from the BIA (RTO/RPO/MTPD).
2. Identify options for people, premises, technology and suppliers.
3. Select strategies that meet objectives at justifiable cost.
4. Provision the required resources.
5. Document solution details and dependencies.
6. Validate against the BIA.

## Workflow
BIA requirements \u2192 options \u2192 selection \u2192 provision \u2192 validate.

## Key Controls
| Control | Standard |
|---|---|
| Meet RTO/RPO | Redundancy; frequent backups; tested restore |
| Site loss | Remote-work + alternate site |
| Staffing | Cross-training; on-call |
| Platform | Provider resilience + failover |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Strategies meeting BIA targets | 100% |
| Provisioned resources ready | 100% |

## Required Records
The strategy document and resource provisioning records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},plans:{title:"Business Continuity Plans",clause:"8.4",content:`# Business Continuity Plans
_ISO 22301:2019 \u2014 Clause 8.4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to provide documented procedures to continue and recover critical activities, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define activation criteria and authority.
2. Establish the incident response team and roles.
3. Set out communications (staff, \${c.CUST}, suppliers).
4. Document recovery procedures per critical activity to meet RTO/RPO.
5. List resources and dependencies.
6. Define return-to-normal criteria.

## Workflow
Activation \u2192 mobilize team \u2192 communicate \u2192 recover per procedure \u2192 return to normal.

## Key Controls
| Control | Standard |
|---|---|
| Activation criteria | Defined & authorized |
| Team & roles | Named |
| Communications | Pre-drafted |
| Recovery procedures | Per critical activity |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Plans covering critical activities | 100% |
| Plans accessible during disruption | Yes |

## Required Records
Continuity plans, contact lists, and recovery procedures. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},incident:{title:"Incident Response Structure",clause:"8.4.2",content:`# Incident Response Structure
_ISO 22301:2019 \u2014 Clause 8.4.2 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to provide a defined structure to respond to disruptive incidents, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Detect and assess the incident's severity.
2. Activate the response structure and escalate.
3. Establish command, safety and communications.
4. Coordinate recovery per the plans.
5. Communicate with \${c.CUST} and stakeholders.
6. Stand down and review after resolution.

## Workflow
Detect \u2192 assess \u2192 activate \u2192 command \u2192 recover \u2192 communicate \u2192 stand down \u2192 review.

## RACI Matrix
| Activity | Incident Manager | Team | Manager | Executive |
|---|---|---|---|---|
| Assess & declare | A | R | C | I |
| Activate response | A | R | C | I |
| Coordinate recovery | R | R | A | I |
| Stakeholder comms | R | C | A | C |

_R = Responsible, A = Accountable, C = Consulted, I = Informed._

## Roles & Responsibilities
- **Incident Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Time to activate | Within target |
| Post-incident reviews | 100% |

## Required Records
Incident logs, decisions, and post-incident reviews. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},exercise:{title:"Exercising & Testing Programme",clause:"8.5",content:`# Exercising & Testing Programme
_ISO 22301:2019 \u2014 Clause 8.5 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to validate the plans and build capability through a programme of exercises, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Plan a programme of exercises across plan types.
2. Run tabletop walkthroughs of the plans.
3. Run technical recovery / failover tests.
4. Test communications and notifications.
5. Capture findings and lessons.
6. Update plans and re-test as needed.

## Workflow
Plan programme \u2192 tabletop \u2192 technical test \u2192 comms test \u2192 findings \u2192 update.

## Key Controls
| Control | Standard |
|---|---|
| Plan walkthrough | Semi-annual |
| Recovery / failover | Annual |
| Communications test | Annual |
| Findings | Tracked to closure |

## Roles & Responsibilities
- **Continuity Manager** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| Exercises completed | Per programme |
| Recovery within RTO in tests | 100% |

## Required Records
Exercise plans, results, and improvement actions. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},performance:{title:"Performance Evaluation",clause:"9.1",content:`# Performance Evaluation

_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to ensure AI is built and run on appropriate, well-governed data, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Document data sources and permitted uses.
2. Validate data quality for the AI purpose.
3. Exclude sensitive data unless controlled.
4. Record data provenance.
5. Apply retention and disposal rules.
6. Review data governance on AI change.

## Workflow
Source \u2192 permitted use \u2192 quality check \u2192 provenance \u2192 retention \u2192 review.

## Key Controls
| Control | Standard |
|---|---|
| Data sources | Documented; permitted use |
| Data quality | Validated |
| Sensitive data | Controlled / excluded |
| Provenance | Recorded |

## Roles & Responsibilities
- **Security Lead** \u2014 owns this area; accountable for its outcomes.
- **Team** \u2014 perform the work and record it.
- **Manager** \u2014 accountable for performance.
- **Executive / Program Manager** \u2014 owns the U.S. Department of Commerce relationship; approves resources.

## Metrics & Targets
| Metric | Target |
|---|---|
| AI systems with documented data lineage | 100% |
| Sensitive-data exposure to AI | 0 |

## Required Records
Data source register, quality checks, and provenance records. Retained per the records procedure.

## Review
Reviewed at least annually and on significant change. Revision 1.0.`},soa:{title:"Statement of Applicability (Annex A)",clause:"6.1.3",content:`# Statement of Applicability

_ISO/IEC 42001:2023 \u2014 Annex A \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to manage AI systems responsibly across design, deployment, operation and retirement, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

1. Define intended use and requirements.

3. Validate performance and fairness before deployment.
4. Deploy with human oversight and monitoring.
5. Monitor accuracy and drift in operation.
6. Retire or retrain when performance degrades.

## Workflow
Define \u2192 assess \u2192 validate \u2192 deploy (oversight) \u2192 monitor \u2192 retrain/retire.

| Control | Standard |

| Metric | Target |
|---|---|

_SOC 2 (AICPA TSC) \u2014 CC4 \xB7 Meridian Federal Solutions \xB7 U.S. Department of Commerce_

## Policy
It is Meridian Federal Solutions's policy to monitor that controls are present and operating effectively, in delivering the Enterprise IT Service Desk (EITSD) contract to U.S. Department of Commerce across ServiceNow (9,200 users, 14 sites). Defined, measured and continually improved.

## Procedure
1. Define control monitoring activities.
2. Collect evidence of control operation.
3. Perform internal control reviews / audits.
